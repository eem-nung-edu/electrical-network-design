<style>
:root {
  --bg: #f6f4f0; --surface: #ffffff; --surface2: #edeae4;
  --text: #1a1a1a; --text2: #555;
  --accent: #1a5276; --accent2: #2980b9;
  --green: #1e8449; --green-bg: #eafaf1;
  --red: #c0392b; --red-bg: #fdedec;
  --orange: #d68910; --orange-bg: #fef9e7;
  --blue-bg: #ebf5fb;
  --border: #d5d0c8; --radius: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;font-size:15px}
h1,h2,h3,h4{font-family:'Source Serif 4',serif;font-weight:700;color:var(--accent)}
h1{font-size:1.55rem;margin-bottom:.3rem}
h2{font-size:1.25rem;margin:1.2rem 0 .6rem;border-bottom:2px solid var(--accent);padding-bottom:.3rem;display:inline-block}
h3{font-size:1.05rem;margin:1rem 0 .4rem;color:var(--accent2)}
code{font-family:'JetBrains Mono',monospace;font-size:.88em;background:var(--surface2);padding:1px 5px;border-radius:3px}
.header{background:linear-gradient(135deg,#1a5276 0%,#2980b9 100%);color:#fff;padding:1.3rem 2rem;text-align:center}
.header h1{color:#fff;font-size:1.7rem}
.header p{color:rgba(255,255,255,.85);font-size:.95rem;margin-top:.3rem}
.container{max-width:1200px;margin:0 auto;padding:1rem 1.5rem 3rem}
.variant-bar{display:flex;align-items:center;gap:1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.8rem 1.2rem;margin-bottom:1rem;flex-wrap:wrap;box-shadow:var(--shadow)}
.variant-bar label{font-weight:700;font-size:.95rem;white-space:nowrap}
.variant-bar select{font-family:inherit;font-size:.95rem;padding:.4rem .8rem;border:1px solid var(--border);border-radius:5px;background:#fff;min-width:100px}
.tabs{display:flex;flex-wrap:wrap;gap:2px;background:var(--surface2);border-radius:var(--radius) var(--radius) 0 0;overflow:hidden;margin-top:.6rem}
.tab-btn{flex:1;min-width:130px;padding:.7rem .5rem;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:700;color:var(--text2);transition:all .2s;text-align:center;white-space:nowrap}
.tab-btn:hover{background:rgba(26,82,118,.08)}
.tab-btn.active{background:var(--surface);color:var(--accent);box-shadow:inset 0 3px 0 var(--accent)}
.tab-panel{display:none;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:1.4rem;box-shadow:var(--shadow);min-height:500px}
.tab-panel.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.2rem;margin:.8rem 0;box-shadow:var(--shadow)}
.note{padding:.7rem 1rem;border-radius:6px;margin:.6rem 0;font-size:.9rem;line-height:1.55}
.note-info{background:var(--blue-bg);border-left:4px solid var(--accent2)}
.note-ok{background:var(--green-bg);border-left:4px solid var(--green)}
.note-warn{background:var(--orange-bg);border-left:4px solid var(--orange)}
.note-err{background:var(--red-bg);border-left:4px solid var(--red)}
table{width:100%;border-collapse:collapse;font-size:.88rem;margin:.6rem 0}
th,td{border:1px solid var(--border);padding:.45rem .6rem;text-align:center}
th{background:var(--accent);color:#fff;font-weight:600;font-size:.82rem}
tr:nth-child(even){background:var(--surface2)}
tr.highlight{background:#d4efdf;font-weight:700}
.step{margin:1.5rem 0;padding-left:1rem;border-left:3px solid var(--accent2)}
.step-num{display:inline-block;background:var(--accent);color:#fff;font-weight:800;font-size:.78rem;padding:2px 8px;border-radius:10px;margin-bottom:.3rem}
.formula-block{background:var(--surface2);border-radius:6px;padding:.8rem 1rem;margin:.5rem 0;overflow-x:auto}
.check-ok{color:var(--green);font-weight:800}
.check-fail{color:var(--red);font-weight:800}
.svg-wrap{text-align:center;margin:1rem 0;overflow-x:auto}
.chart-wrap{max-width:750px;margin:1.5rem auto}
@media(max-width:700px){
  .container{padding:.6rem .8rem}
  .tab-btn{min-width:80px;font-size:.72rem;padding:.55rem .3rem}
}
.mjx-chtml{font-size:126%!important}
.result-box{display:inline-block;background:var(--accent);color:#fff;padding:3px 12px;border-radius:4px;font-weight:700;font-size:.95rem;margin:.2rem 0}
</style>
</head>
