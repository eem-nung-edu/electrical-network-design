<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота - Розрахунок режиму мережі</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)']],
                displayMath: [['\\[', '\\]']]
            },
            startup: {
                typeset: false
            }
        };
    </script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 20px auto;
            max-width: 950px;
            padding: 0 20px;
            color: #333;
        }
        select {
            font-size: 16px;
            padding: 8px 10px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 350px;
            cursor: pointer;
        }
        .header-section {
            background: #f4f4f4;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid #0056b3;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .solution-section {
            background: #eef8ff;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid #28a745;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .hidden {
            display: none;
        }
        hr {
            border: 0;
            border-top: 1px solid #c2e0f4;
            margin: 25px 0;
        }
        #filname-btn {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 50px;
            height: 50px;
            opacity: 0;
            cursor: default;
            z-index: 9999;
        }
        .header-section, .solution-section {
            overflow-x: auto;
        }
        @media screen and (max-width: 768px) {
            body { padding: 10px; margin: 0 auto; }
            h2 { font-size: 1.3rem; }
            h3, h4 { font-size: 1.1rem; }
            p, li { font-size: 0.95rem; }
            select { 
                max-width: 100%; 
                font-size: 16px; 
                padding: 12px;
            } 
        }
    </style>
</head>
<body>

    <h2>Комплексне практичне завдання</h2>
    <label for="variantSelect"><b>Оберіть варіант:</b></label><br>
    <select id="variantSelect" onchange="renderContent()">
        <!-- Опції генеруються скриптом -->
    </select>

    <div id="problemStatement" class="header-section"></div>
    <div id="solutionContent" class="solution-section hidden"></div>

    <script>
        // -----------------------------------------------------------------------
        // Довідкові дані проводів (з Додатку А)
        // -----------------------------------------------------------------------
        const wires = [
            { name: "АС-35/6",   r0: 0.822, d: 7.5  },
            { name: "АС-50/8",   r0: 0.592, d: 9.0  },
            { name: "АС-70/11",  r0: 0.429, d: 11.4 },
            { name: "АС-95/16",  r0: 0.306, d: 13.5 },
            { name: "АС-120/19", r0: 0.249, d: 15.2 },
            { name: "АС-150/24", r0: 0.198, d: 17.1 },
            { name: "АС-185/29", r0: 0.162, d: 18.8 },
            { name: "АС-240/39", r0: 0.124, d: 21.6 }
        ];

        // -----------------------------------------------------------------------
        // Відповідність напруги до допустимих проводів та Dср згідно ПУЕ України
        // Виправлення: кожен рівень напруги має свій діапазон допустимих проводів
        // -----------------------------------------------------------------------
        const voltData = [
            {
                u: 6,
                dcp: 0.6,
                // 6 кВ → малі перерізи: АС-35...АС-120
                wireIndices: [0, 1, 2, 3, 4]
            },
            {
                u: 10,
                dcp: 1.0,
                // 10 кВ → малі перерізи: АС-35...АС-120
                wireIndices: [0, 1, 2, 3, 4]
            },
            {
                u: 35,
                dcp: 3.0,
                // 35 кВ → середні перерізи: АС-70...АС-185
                wireIndices: [2, 3, 4, 5, 6]
            },
            {
                u: 110,
                dcp: 5.0,
                // 110 кВ → великі перерізи: АС-95...АС-240
                wireIndices: [3, 4, 5, 6, 7]
            }
            // Виправлення: 330 кВ вилучено — потребує розщеплених фаз (2×АС-240 і більше),
            // що виходить за межі даної моделі однопровідної лінії
        ];

        let variants = [];
        let isUnlocked = false;
        let mathJaxPromise = Promise.resolve();

        // -----------------------------------------------------------------------
        // Генерація 21 варіанту
        // -----------------------------------------------------------------------
        function generateVariants() {
            // Варіант 0 — жорстко заданий еталонний приклад
            // 110 кВ, АС-150/24 — відповідає ПУЕ
            variants.push({
                id: 0, L: 50, wire: wires[5], U2: 110, P2: 30, Q2: 18, Dcp: 5.0
            });

            for (let i = 1; i <= 20; i++) {
                // Обираємо рівень напруги
                const vd = voltData[Math.floor(Math.random() * voltData.length)];
                // Обираємо провід лише з допустимого діапазону для цієї напруги (ПУЕ)
                const allowedIdx = vd.wireIndices[Math.floor(Math.random() * vd.wireIndices.length)];
                variants.push({
                    id: i,
                    L: 30 + Math.floor(Math.random() * 71), // 30…100 км
                    wire: wires[allowedIdx],
                    U2: vd.u,
                    P2: 10 + Math.floor(Math.random() * 51),
                    Q2: 5  + Math.floor(Math.random() * 31),
                    Dcp: vd.dcp
                });
            }
        }

        // -----------------------------------------------------------------------
        // Службові функції
        // -----------------------------------------------------------------------
        function simpleHash(str) {
            let hash = 0;
            if (str.length === 0) return hash.toString(16);
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return (hash >>> 0).toString(16);
        }

        function checkCode(userInput) {
            const correctHash = "6284fefd";
            return (!userInput) ? false : simpleHash(userInput) === correctHash;
        }

        // Форматування чисел: десятковий роздільник — кома (ДСТУ 3651)
        const fmt = (num, dec = 3) => Number(num).toFixed(dec).replace('.', ',');

        // -----------------------------------------------------------------------
        // Розрахунок і формування HTML для конкретного варіанту
        // -----------------------------------------------------------------------
        function getVariantHTML(v) {
            // --- РОЗРАХУНКИ ---
            const r_pr_mm = v.wire.d / 2;
            const r_pr_m  = r_pr_mm / 1000;

            // Виправлення: у формулі x0 числові константи — 0,144 і 0,0157 (кома за ДСТУ)
            const x0 = 0.144 * Math.log10(v.Dcp / r_pr_m) + 0.0157;

            const R = v.wire.r0 * v.L;
            const X = x0 * v.L;

            const dU_long  = (v.P2 * R + v.Q2 * X) / v.U2;
            const dU_cross = (v.P2 * X - v.Q2 * R) / v.U2;
            const U1 = Math.sqrt(Math.pow(v.U2 + dU_long, 2) + Math.pow(dU_cross, 2));

            const P2_Q2_sum = Math.pow(v.P2, 2) + Math.pow(v.Q2, 2);
            const U2_sq     = Math.pow(v.U2, 2);
            const dP = (P2_Q2_sum / U2_sq) * R;
            const dQ = (P2_Q2_sum / U2_sq) * X;

            const P1 = v.P2 + dP;
            const Q1 = v.Q2 + dQ;

            // --- Частина 2 ---
            const U_star = 0.9;
            const Unew   = v.U2 * U_star; // зберігаємо як число, округлюємо лише при виведенні

            // Коефіцієнти полінома реактивної потужності залежно від класу напруги
            let b0, b1, b2;
            if (v.U2 <= 10) {
                b0 = 4.9; b1 = -10.1; b2 = 6.2;
            } else {
                b0 = 3.7; b1 = -7.0;  b2 = 4.3;
            }

            // Виправлення: числові константи полінома P — 0,83; -0,3; 0,47 (кома за ДСТУ)
            const P_star = 0.83 - 0.3 * U_star + 0.47 * Math.pow(U_star, 2);
            const Q_star = b0 + b1 * U_star + b2 * Math.pow(U_star, 2);

            const Pnew_poly = v.P2 * P_star;
            const Qnew_poly = v.Q2 * Q_star;

            const rH = Math.pow(v.U2, 2) / v.P2;
            const xH = Math.pow(v.U2, 2) / v.Q2;
            const Pnew_Z = Math.pow(Unew, 2) / rH;
            const Qnew_Z = Math.pow(Unew, 2) / xH;

            const Pnew_I = v.P2 * U_star;
            const Qnew_I = v.Q2 * U_star;

            // Виправлення: Unew може бути нецілим — відображаємо з 1 знаком після коми
            const UnewFmt = fmt(Unew, 1);

            // Знак та абсолютне значення b1 для коректного відображення у формулі
            const b1sign = b1 < 0 ? '-' : '+';
            const b1abs  = fmt(Math.abs(b1), 1);

            // -----------------------------------------------------------------------
            // HTML умови задачі
            // -----------------------------------------------------------------------
            const problemHtml = `
                <h3>Вихідні дані (Варіант ${v.id})</h3>
                <p>Районна підстанція живиться від трифазної повітряної лінії електропередавання.</p>
                <ul>
                    <li><b>Довжина лінії:</b> \\( L = ${v.L} \\) км.</li>
                    <li><b>Марка проводу:</b> ${v.wire.name}.</li>
                    <li><b>Напруга в кінці лінії (на шинах навантаження):</b> \\( U_2 = ${v.U2} \\) кВ.</li>
                    <li><b>Потужність навантаження у вихідному режимі:</b> \\( P_2 = ${v.P2} \\) МВт, \\( Q_2 = ${v.Q2} \\) Мвар.</li>
                    <li><b>Середньогеометрична відстань між проводами:</b> \\( D_{\\text{сг}} = ${fmt(v.Dcp, 1)} \\) м.</li>
                </ul>
                <p><b>Що потрібно зробити:</b></p>
                <p><b>Частина 1:</b> Визначити параметри \\( r_0, x_0, R, X \\). Розрахувати втрату та спад напруги, модуль напруги на початку лінії \\( U_1 \\). Знайти втрати потужності \\( \\Delta P, \\Delta Q \\) та повну потужність \\( S_1 \\).</p>
                <p><b>Частина 2:</b> При зниженні напруги \\( U_2 \\) на 10% розрахувати нові потужності \\( P_{\\text{new}}, Q_{\\text{new}} \\) трьома методами: <br>
                1) за допомогою типового полінома 2-го степеня; <br>
                2) задавши навантаження сталим опором \\( Z_\\text{н} = \\text{const} \\); <br>
                3) задавши навантаження сталим струмом \\( I_\\text{н} = \\text{const} \\).</p>
            `;

            // -----------------------------------------------------------------------
            // HTML розв'язання
            // Виправлення: усі числові константи у LaTeX-формулах — через кому (ДСТУ 3651):
            //   0,144  0,0157  0,83  0,3  0,47  0,9
            // -----------------------------------------------------------------------
            const solutionHtml = `
                <h3>РОЗВ'ЯЗАННЯ ЗАДАЧІ (Варіант ${v.id})</h3>
                <h4>Частина 1: Аналіз режиму роботи лінії (за Лаб. №1)</h4>
                
                <p><b>Крок 1.1. Визначення питомих та повних параметрів лінії</b><br>
                Згідно з Додатком А, для проводу <b>${v.wire.name}</b>:<br>
                * Питомий активний опір: \\( r_0 = ${fmt(v.wire.r0)} \\) Ом/км.<br>
                * Діаметр проводу: \\( d = ${fmt(v.wire.d, 1)} \\) мм.
                  Радіус проводу
                  \\( R_{\\text{пр}} = \\dfrac{d}{2} = \\dfrac{${fmt(v.wire.d, 1)}}{2} = ${fmt(r_pr_mm, 2)} \\text{ мм} = ${fmt(r_pr_m, 5)} \\text{ м} \\).</p>

                <p>Знайдемо питомий індуктивний опір \\( x_0 \\):
                \\[ x_0 = 0{,}144 \\cdot \\lg\\!\\left(\\frac{D_{\\text{сг}}}{R_{\\text{пр}}}\\right) + 0{,}0157 \\]
                \\[ x_0 = 0{,}144 \\cdot \\lg\\!\\left(\\frac{${fmt(v.Dcp, 1)}}{${fmt(r_pr_m, 5)}}\\right) + 0{,}0157 = ${fmt(x0)} \\text{ Ом/км} \\]</p>

                <p>Повні опори лінії (\\( L = ${v.L} \\) км):<br>
                * Активний опір: \\( R = r_0 \\cdot L = ${fmt(v.wire.r0)} \\cdot ${v.L} = ${fmt(R, 2)} \\) Ом.<br>
                * Індуктивний опір: \\( X = x_0 \\cdot L = ${fmt(x0)} \\cdot ${v.L} = ${fmt(X, 2)} \\) Ом.</p>

                <p><b>Крок 1.2. Розрахунок спаду та втрати напруги</b><br>
                Поздовжня складова спаду напруги (втрата напруги):
                \\[ \\Delta U = \\frac{P_2 \\cdot R + Q_2 \\cdot X}{U_2} = \\frac{${v.P2} \\cdot ${fmt(R, 2)} + ${v.Q2} \\cdot ${fmt(X, 2)}}{${v.U2}} = ${fmt(dU_long)} \\text{ кВ} \\]</p>

                <p>Поперечна складова спаду напруги:
                \\[ \\delta U = \\frac{P_2 \\cdot X - Q_2 \\cdot R}{U_2} = \\frac{${v.P2} \\cdot ${fmt(X, 2)} - ${v.Q2} \\cdot ${fmt(R, 2)}}{${v.U2}} = ${fmt(dU_cross)} \\text{ кВ} \\]</p>

                <p>Модуль напруги на початку лінії:
                \\[ U_1 = \\sqrt{(U_2 + \\Delta U)^2 + \\delta U^2} = \\sqrt{(${v.U2} + ${fmt(dU_long)})^2 + (${fmt(dU_cross)})^2} = ${fmt(U1)} \\text{ кВ} \\]</p>

                <p><b>Крок 1.3. Розрахунок втрат потужності</b><br>
                Втрати активної потужності:
                \\[ \\Delta P = \\frac{P_2^2 + Q_2^2}{U_2^2} \\cdot R = \\frac{${v.P2}^2 + ${v.Q2}^2}{${v.U2}^2} \\cdot ${fmt(R, 2)} = ${fmt(dP)} \\text{ МВт} \\]</p>

                <p>Втрати реактивної потужності:
                \\[ \\Delta Q = \\frac{P_2^2 + Q_2^2}{U_2^2} \\cdot X = \\frac{${v.P2}^2 + ${v.Q2}^2}{${v.U2}^2} \\cdot ${fmt(X, 2)} = ${fmt(dQ)} \\text{ Мвар} \\]</p>

                <p>Потужність на початку лінії:
                \\[ P_1 = P_2 + \\Delta P = ${v.P2} + ${fmt(dP)} = ${fmt(P1)} \\text{ МВт} \\]
                \\[ Q_1 = Q_2 + \\Delta Q = ${v.Q2} + ${fmt(dQ)} = ${fmt(Q1)} \\text{ Мвар} \\]
                \\[ S_1 = ${fmt(P1)} + j\\,${fmt(Q1)} \\text{ МВА} \\]</p>

                <hr>

                <h4>Частина 2: Розрахунок потужності навантаження при зниженні напруги на 10%</h4>
                <p>Відносне значення напруги: \\( U_* = 1 - 0{,}1 = 0{,}9 \\).<br>
                Фактична напруга: \\( U_{\\text{new}} = ${v.U2} \\cdot 0{,}9 = ${UnewFmt} \\) кВ.</p>

                <p><b>Метод 1. За допомогою полінома 2-го степеня (Лаб. №2)</b><br>
                Використовуємо задані коефіцієнти апроксимації для вузла ${v.U2} кВ:
                \\[ P_* = a_0 + a_1 U_* + a_2 U_*^2 = 0{,}83 - 0{,}3 \\cdot 0{,}9 + 0{,}47 \\cdot 0{,}9^2 = ${fmt(P_star, 4)} \\]
                \\[ Q_* = b_0 + b_1 U_* + b_2 U_*^2 = ${fmt(b0, 1)} ${b1sign} ${b1abs} \\cdot 0{,}9 + ${fmt(b2, 1)} \\cdot 0{,}9^2 = ${fmt(Q_star, 4)} \\]</p>

                <p>Фактичні потужності в іменованих одиницях:
                \\[ P_{\\text{new(poly)}} = P_2 \\cdot P_* = ${v.P2} \\cdot ${fmt(P_star, 4)} = \\mathbf{${fmt(Pnew_poly, 2)} \\text{ МВт}} \\]
                \\[ Q_{\\text{new(poly)}} = Q_2 \\cdot Q_* = ${v.Q2} \\cdot ${fmt(Q_star, 4)} = \\mathbf{${fmt(Qnew_poly, 2)} \\text{ Мвар}} \\]</p>

                <p><b>Метод 2. Подання навантаження сталим опором \\( Z_\\text{н} = \\text{const} \\) (Лаб. №3)</b><br>
                Розрахуємо фіктивні сталі опори навантаження:
                \\[ r_\\text{н} = \\frac{U_2^2}{P_2} = \\frac{${v.U2}^2}{${v.P2}} = ${fmt(rH, 2)} \\text{ Ом} \\]
                \\[ x_\\text{н} = \\frac{U_2^2}{Q_2} = \\frac{${v.U2}^2}{${v.Q2}} = ${fmt(xH, 2)} \\text{ Ом} \\]</p>

                <p>Фактичні потужності при новій напрузі \\( ${UnewFmt} \\) кВ:
                \\[ P_{\\text{new}(Z)} = \\frac{U_{\\text{new}}^2}{r_\\text{н}} = \\frac{${UnewFmt}^2}{${fmt(rH, 2)}} = \\mathbf{${fmt(Pnew_Z, 2)} \\text{ МВт}} \\]
                \\[ Q_{\\text{new}(Z)} = \\frac{U_{\\text{new}}^2}{x_\\text{н}} = \\frac{${UnewFmt}^2}{${fmt(xH, 2)}} = \\mathbf{${fmt(Qnew_Z, 2)} \\text{ Мвар}} \\]</p>

                <p><b>Метод 3. Подання навантаження сталим струмом \\( I_\\text{н} = \\text{const} \\) (Лаб. №3)</b>
                \\[ P_{\\text{new}(I)} = P_2 \\cdot \\frac{U_{\\text{new}}}{U_2} = ${v.P2} \\cdot 0{,}9 = \\mathbf{${fmt(Pnew_I, 2)} \\text{ МВт}} \\]
                \\[ Q_{\\text{new}(I)} = Q_2 \\cdot \\frac{U_{\\text{new}}}{U_2} = ${v.Q2} \\cdot 0{,}9 = \\mathbf{${fmt(Qnew_I, 2)} \\text{ Мвар}} \\]</p>
            `;

            return { problemHtml, solutionHtml };
        }

        // -----------------------------------------------------------------------
        // Рендеринг контенту
        // -----------------------------------------------------------------------
        function renderContent() {
            const select    = document.getElementById("variantSelect");
            const variantId = parseInt(select.value);
            const variantData = variants[variantId];

            const content = getVariantHTML(variantData);

            document.getElementById("problemStatement").innerHTML = content.problemHtml;
            const solDiv = document.getElementById("solutionContent");
            solDiv.innerHTML = content.solutionHtml;

            if (variantId === 0 || isUnlocked) {
                solDiv.classList.remove("hidden");
            } else {
                solDiv.classList.add("hidden");
            }

            if (window.MathJax && window.MathJax.typesetPromise) {
                mathJaxPromise = mathJaxPromise.then(() => {
                    return MathJax.typesetPromise();
                }).catch((err) => console.log('Помилка рендеру формул: ', err.message));
            }
        }

        // -----------------------------------------------------------------------
        // Замаскована функція перевірки
        // -----------------------------------------------------------------------
        function checkPIK() {
            if (isUnlocked) return;

            const _prmptCode = [1042, 1074, 1077, 1076, 1110, 1090, 1100, 32, 1087, 1088, 1110, 1079, 1074, 1080, 1097, 1077];
            const pText = String.fromCharCode.apply(null, _prmptCode);

            const bbb = prompt(pText);

            if (typeof bbb === 'string' && !(checkCode(bbb) ^ 1)) {
                isUnlocked = !0;

                const _msgCode = [1044, 1086, 1089, 1090, 1091, 1087, 32, 1076, 1086, 1079, 1074, 1086, 1083, 1077, 1085, 1086, 33, 32, 1058, 1077, 1087, 1077, 1088, 32, 1088, 1086, 1079, 1074, 39, 1103, 1079, 1082, 1080, 32, 1074, 1080, 1076, 1080, 1084, 1110, 32, 1076, 1083, 1103, 32, 1074, 1089, 1110, 1093, 32, 1074, 1072, 1088, 1110, 1072, 1085, 1090, 1110, 1074, 46];
                const mText = String.fromCharCode.apply(null, _msgCode);

                alert(mText);
                renderContent();
            }
        }

        // -----------------------------------------------------------------------
        // Ініціалізація
        // -----------------------------------------------------------------------
        window.onload = () => {
            generateVariants();

            const select = document.getElementById("variantSelect");
            for (let i = 0; i <= 20; i++) {
                let opt = document.createElement("option");
                opt.value   = i;
                opt.innerHTML = `Варіант ${i}`;
                select.appendChild(opt);
            }

            const secretL   = document.createElement("div");
            secretL.id      = "filname-btn";
            secretL.onclick = checkPIK;
            document.body.appendChild(secretL);

            renderContent();
            if (window.MathJax && window.MathJax.typesetPromise) {
                MathJax.typesetPromise();
            }
        };
    </script>
</body>
</html>
