<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SITKA Web — Розрахунок режимів електричних мереж</title>
<script>
window.MathJax = {
  tex: { inlineMath: [['\\(','\\)']], displayMath: [['\\[','\\]']] },
  startup: { typeset: false }
};
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

/* ═══════════════════════════════════════════
   CSS CUSTOM PROPERTIES — LIGHT THEME
   ═══════════════════════════════════════════ */
:root {
  --font-body: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', 'Consolas', monospace;

  --bg: #f4f5f7;
  --bg-alt: #edeef1;
  --surf: #ffffff;
  --surf-raised: #ffffff;
  --surf-sunken: #f0f1f4;
  --brd: #d4d7dd;
  --brd-light: #e5e7eb;
  --brd-focus: #2563eb;

  --blue: #2563eb;
  --blue-light: #dbeafe;
  --blue-dark: #1d4ed8;
  --green: #16a34a;
  --green-light: #dcfce7;
  --red: #dc2626;
  --red-light: #fef2f2;
  --orange: #d97706;
  --orange-light: #fef3c7;
  --purple: #7c3aed;
  --purple-light: #ede9fe;
  --teal: #0891b2;

  --tx: #1e293b;
  --tx-2: #475569;
  --tx-3: #94a3b8;
  --tx-inv: #ffffff;

  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;

  --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -2px rgba(0,0,0,.05);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.07), 0 4px 6px -4px rgba(0,0,0,.04);

  --transition: 150ms ease;
}

/* ═══════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--tx);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
img, svg { display: block; max-width: 100%; }
button, input, select, textarea { font-family: inherit; font-size: inherit; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ═══════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════ */
.app-header {
  background: var(--surf);
  border-bottom: 1px solid var(--brd);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}
.app-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.app-logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  color: white; font-family: var(--font-mono); font-weight: 700; font-size: 14px;
  letter-spacing: -0.5px;
}
.app-logo-text {
  display: flex; flex-direction: column; line-height: 1.2;
}
.app-logo-title { font-weight: 700; font-size: 16px; color: var(--tx); }
.app-logo-sub { font-size: 11px; color: var(--tx-3); font-weight: 500; }

.app-nav {
  display: flex; gap: 4px; margin-left: auto; flex-wrap: wrap;
}
.nav-btn {
  padding: 7px 14px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--tx-2);
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}
.nav-btn:hover { background: var(--surf-sunken); color: var(--tx); }
.nav-btn.active {
  background: var(--blue);
  color: var(--tx-inv);
  border-color: var(--blue);
}
.nav-btn .nav-badge {
  display: inline-block;
  background: rgba(255,255,255,.2);
  padding: 1px 6px;
  border-radius: 10px;
  font-size: 10px;
  margin-left: 4px;
  font-family: var(--font-mono);
}
.nav-btn:not(.active) .nav-badge {
  background: var(--surf-sunken);
  color: var(--tx-3);
}

.app-body { max-width: 1280px; margin: 0 auto; padding: 20px 24px 60px; }

/* ═══════════════════════════════════════════
   MODULE PANELS
   ═══════════════════════════════════════════ */
.module { display: none; }
.module.active { display: block; }

/* ═══════════════════════════════════════════
   CARD
   ═══════════════════════════════════════════ */
.card {
  background: var(--surf);
  border: 1px solid var(--brd-light);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
.card-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--tx-3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title::before {
  content: '';
  width: 3px; height: 14px;
  background: var(--blue);
  border-radius: 2px;
  flex-shrink: 0;
}
.card-title.green::before { background: var(--green); }
.card-title.orange::before { background: var(--orange); }
.card-title.purple::before { background: var(--purple); }
.card-title.red::before { background: var(--red); }

/* ═══════════════════════════════════════════
   FORM CONTROLS
   ═══════════════════════════════════════════ */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-label {
  font-size: 12px; font-weight: 600; color: var(--tx-2);
}
.form-input, .form-select {
  padding: 9px 12px;
  border: 1px solid var(--brd);
  border-radius: var(--radius-sm);
  background: var(--surf);
  color: var(--tx);
  font-size: 14px;
  transition: border-color var(--transition);
  outline: none;
  width: 100%;
}
.form-input:focus, .form-select:focus {
  border-color: var(--brd-focus);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, .1);
}
.form-input::placeholder { color: var(--tx-3); }
.form-select { cursor: pointer; }
.m3-calc-active {
  background: var(--blue) !important;
  color: white !important;
  border-color: var(--blue) !important;
}
.form-hint { font-size: 11px; color: var(--tx-3); line-height: 1.4; }

.form-row {
  display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap;
}

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 20px;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}
.btn-primary {
  background: var(--blue);
  color: var(--tx-inv);
}
.btn-primary:hover { background: var(--blue-dark); }
.btn-secondary {
  background: var(--surf);
  border-color: var(--brd);
  color: var(--tx-2);
}
.btn-secondary:hover { background: var(--surf-sunken); color: var(--tx); }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* ═══════════════════════════════════════════
   DATA GRID (initial data display)
   ═══════════════════════════════════════════ */
.data-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px;
}
.data-cell {
  background: var(--surf-sunken);
  border: 1px solid var(--brd-light);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
}
.data-label {
  font-size: 11px; color: var(--tx-3);
  font-family: var(--font-mono); font-weight: 500;
  margin-bottom: 2px;
}
.data-value {
  font-size: 16px; font-weight: 700;
  font-family: var(--font-mono);
  color: var(--blue);
}
.data-value.green { color: var(--green); }
.data-value.orange { color: var(--orange); }
.data-value.purple { color: var(--purple); }
.data-value.red { color: var(--red); }
.data-unit {
  font-size: 11px; color: var(--tx-3); font-weight: 500; margin-left: 2px;
}

/* ═══════════════════════════════════════════
   TABLES
   ═══════════════════════════════════════════ */
.table-wrap { overflow-x: auto; margin: 8px 0; border-radius: var(--radius-sm); }
.tbl {
  width: 100%; border-collapse: collapse; font-size: 12px;
}
.tbl th {
  background: var(--surf-sunken);
  color: var(--tx-2);
  padding: 8px 10px;
  text-align: center;
  border: 1px solid var(--brd-light);
  font-weight: 600;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  white-space: nowrap;
}
.tbl td {
  padding: 7px 10px;
  text-align: center;
  border: 1px solid var(--brd-light);
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--tx);
}
.tbl tbody tr:hover td { background: rgba(37, 99, 235, .03); }
.tbl .converged td { background: var(--green-light); font-weight: 600; }
.tbl .iter-first td { background: var(--blue-light); }
.tbl .hl { color: var(--orange); font-weight: 700; }
.tbl .gn { color: var(--green); font-weight: 700; }
.tbl .rd { color: var(--red); font-weight: 600; }
.tbl .pu { color: var(--purple); font-weight: 600; }
.tbl .bl { color: var(--blue); font-weight: 700; }

/* ЛР №3: таблиці з колонками точок розподілу.
   Важливо: ширину задаємо через colgroup, а не через :has(), щоб браузер
   не розтягував усі числові колонки і не ламав компактність таблиці. */
.tbl.m3-analysis-flow-table {
  table-layout: fixed;
  width: max-content;
  min-width: 0;
}

.tbl.m3-analysis-flow-table th,
.tbl.m3-analysis-flow-table td {
  overflow: hidden;
}

.tbl.m3-analysis-flow-table th.m3-split-point-col,
.tbl.m3-analysis-flow-table td.m3-split-point-col {
  white-space: normal;
  line-height: 1.45;
  word-break: normal;
  overflow-wrap: break-word;
  vertical-align: top;
}

.tbl.m3-analysis-flow-table td.m3-split-point-col {
  text-align: left;
}

.tbl.m3-analysis-flow-table .m3-col-regime { width: 176px; }
.tbl.m3-analysis-flow-table .m3-col-angle { width: 72px; }
.tbl.m3-analysis-flow-table .m3-col-num { width: 92px; }
.tbl.m3-analysis-flow-table .m3-col-section { width: 96px; }
.tbl.m3-analysis-flow-table .m3-col-point { width: 224px; }
.tbl.m3-analysis-flow-table .m3-col-eval { width: 150px; }

/* ═══════════════════════════════════════════
   RESULT LINE
   ═══════════════════════════════════════════ */
.result-line {
  background: var(--green-light);
  border-left: 3px solid var(--green);
  padding: 10px 16px;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  margin: 8px 0;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--tx);
}
.result-line.warn {
  background: var(--orange-light);
  border-left-color: var(--orange);
}
.result-line.err {
  background: var(--red-light);
  border-left-color: var(--red);
}

/* ═══════════════════════════════════════════
   FORMULA BOX (MathJax)
   ═══════════════════════════════════════════ */
.formula-box {
  background: var(--surf-sunken);
  border: 1px solid var(--brd-light);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin: 10px 0;
  font-size: 13px;
  overflow-x: auto;
}
.formula-box b { color: var(--tx); }

/* ═══════════════════════════════════════════
   TABS (within modules)
   ═══════════════════════════════════════════ */
.tab-bar {
  display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap;
  border-bottom: 1px solid var(--brd-light);
  padding-bottom: 8px;
}
.tab-btn {
  padding: 7px 14px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--tx-2);
  font-weight: 600;
  font-size: 12px;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}
.tab-btn:hover { background: var(--surf-sunken); color: var(--tx); }
.tab-btn.active {
  background: var(--blue);
  color: var(--tx-inv);
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ═══════════════════════════════════════════
   SCHEMA SVG
   ═══════════════════════════════════════════ */
.schema-wrap {
  background: var(--surf-sunken);
  border: 1px solid var(--brd-light);
  border-radius: var(--radius);
  padding: 16px;
  overflow-x: auto;
}

/* ═══════════════════════════════════════════
   CHARTS
   ═══════════════════════════════════════════ */
.chart-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.chart-box {
  background: white;
  border: 1px solid var(--brd-light);
  border-radius: var(--radius);
  padding: 14px;
  position: relative;
  height: 290px;
}
.chart-label {
  font-size: 13px; color: var(--tx-2); margin-bottom: 6px; font-weight: 600;
}

/* ═══════════════════════════════════════════
   VECTOR DIAGRAM
   ═══════════════════════════════════════════ */
.vec-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.vec-box {
  background: var(--surf-sunken);
  border: 1px solid var(--brd-light);
  border-radius: var(--radius);
  padding: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.vec-box p {
  font-size: 12px; color: var(--tx-2); font-weight: 600;
  align-self: flex-start; margin-bottom: 8px;
}

/* ═══════════════════════════════════════════
   ANALYSIS BLOCKS
   ═══════════════════════════════════════════ */
.analysis-block {
  border: 1px solid var(--brd-light);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.analysis-block.info { border-left: 3px solid var(--blue); background: rgba(37,99,235,.02); }
.analysis-block.good { border-left: 3px solid var(--green); background: rgba(22,163,74,.02); }
.analysis-block.warn { border-left: 3px solid var(--orange); background: rgba(217,119,6,.02); }
.analysis-block h4 { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.analysis-block.info h4 { color: var(--blue); }
.analysis-block.good h4 { color: var(--green); }
.analysis-block.warn h4 { color: var(--orange); }
.analysis-block p, .analysis-block li { font-size: 13px; line-height: 1.75; color: var(--tx); }
.analysis-block ul { margin: 6px 0 0 18px; }
.m3-analysis-conclusion {
  margin-top: 12px;
  padding: 12px 14px;
  background: var(--surf-sunken);
  border: 1px solid var(--brd-light);
  border-left: 3px solid var(--blue);
  border-radius: var(--radius-sm);
}
.m3-analysis-conclusion-title {
  display: block;
  margin-bottom: 6px;
  color: var(--tx);
  font-weight: 700;
}
.m3-analysis-conclusion ul { margin: 0 0 0 18px; }
.m3-current-highlight {
  margin-top: 10px;
  padding: 10px 12px;
  background: var(--green-light);
  border: 1px solid rgba(22, 163, 74, .28);
  border-left: 3px solid var(--green);
  border-radius: var(--radius-sm);
  font-size: 13px;
  line-height: 1.6;
}
.m3-current-highlight.warn {
  background: var(--red-light);
  border-color: rgba(220, 38, 38, .28);
  border-left-color: var(--red);
}

/* ═══════════════════════════════════════════
   STATUS / CONVERGENCE INDICATOR
   ═══════════════════════════════════════════ */
.convergence-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px;
  background: var(--surf-sunken);
  border: 1px solid var(--brd-light);
  border-radius: var(--radius-sm);
  margin: 8px 0;
  font-size: 12px;
}
.convergence-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}
.convergence-dot.ok { background: var(--green); }
.convergence-dot.running { background: var(--orange); animation: pulse 1s infinite; }
.convergence-dot.err { background: var(--red); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}


.m3-current-ratio-head {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-width: 52px;
  line-height: 1.05;
  font-family: var(--font-mono);
  font-weight: 700;
}
.m3-current-ratio-head span:first-child {
  display: block;
  width: 100%;
  padding: 0 4px 2px;
  border-bottom: 1.5px solid currentColor;
}
.m3-current-ratio-head span:last-child {
  display: block;
  width: 100%;
  padding: 2px 4px 0;
}

/* ═══════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════ */
@media (max-width: 900px) {
  .chart-grid, .vec-grid { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  html { font-size: 14px; }
  .app-header { padding: 12px 16px; flex-wrap: wrap; }
  .app-nav { margin-left: 0; width: 100%; overflow-x: auto; }
  .app-body { padding: 12px 14px 40px; }
  .card { padding: 14px 16px; }
  .form-grid { grid-template-columns: 1fr 1fr; }
  .data-grid { grid-template-columns: 1fr 1fr; }

  .tbl.m3-analysis-flow-table .m3-col-regime { width: 168px; }
  .tbl.m3-analysis-flow-table .m3-col-angle { width: 68px; }
  .tbl.m3-analysis-flow-table .m3-col-num { width: 82px; }
  .tbl.m3-analysis-flow-table .m3-col-section { width: 86px; }
  .tbl.m3-analysis-flow-table .m3-col-point { width: 236px; }
  .tbl.m3-analysis-flow-table .m3-col-eval { width: 145px; }

  .tbl.m3-analysis-flow-table th.m3-split-point-col,
  .tbl.m3-analysis-flow-table td.m3-split-point-col {
    padding-left: 12px;
    padding-right: 12px;
  }
}

@media (max-width: 480px) {
  .form-grid { grid-template-columns: 1fr; }
  .data-grid { grid-template-columns: 1fr; }
  .form-row { flex-direction: column; }
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--brd); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--tx-3); }

.m3-balancing-table .m3-head-unit {
  display: block;
  margin-top: 2px;
  font-size: 10px;
  line-height: 1.25;
  font-weight: 600;
  color: var(--tx-3);
  text-transform: none;
  letter-spacing: 0;
}
.m3-balancing-table .m3-value-main {
  font-weight: 600;
}
.m3-balancing-table .m3-value-sub {
  font-size: 11px;
  line-height: 1.35;
  color: var(--tx);
  font-weight: 500;
}

</style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     HEADER
     ═══════════════════════════════════════════ -->
<header class="app-header">
  <div class="app-logo">
    <div class="app-logo-icon">S</div>
    <div class="app-logo-text">
      <span class="app-logo-title">SITKA Web</span>
      <span class="app-logo-sub">Розрахунок режимів електричних мереж</span>
    </div>
  </div>
  <nav class="app-nav" id="mainNav">
    <button class="nav-btn active" data-module="m1">ЛР №2<span class="nav-badge">Радіальна</span></button>
    <button class="nav-btn" data-module="m3">ЛР №3<span class="nav-badge">Замкнена</span></button>
    <button class="nav-btn" data-module="m2">ЛР №4<span class="nav-badge">УПК</span></button>
    <button class="nav-btn" data-module="m4">ЛР №5<span class="nav-badge">Розмикання</span></button>
  </nav>
</header>

<!-- ═══════════════════════════════════════════
     BODY
     ═══════════════════════════════════════════ -->
<main class="app-body">

  <!-- MODULE 1: Radial line (LR2) -->
  <section class="module active" id="m1"></section>

  <!-- MODULE 3: Closed network with bilateral supply (LR3) -->
