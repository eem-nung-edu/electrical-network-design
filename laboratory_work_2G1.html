:root {
  --bg: #f6f8fa; --surf: #ffffff; --surf2: #f3f4f6; --brd: #d0d7de;
  --acc: #0969da; --grn: #1a7f37; --red: #cf222e; --pur: #8250df; --org: #bd561d;
  --tx: #1f2328; --tx2: #656d76; --tx3: #8c959f;

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;line-height:1.6}
.hdr{background:linear-gradient(135deg,#f6f8fa,#e1e7ec,#f6f8fa);border-bottom:1px solid var(--brd);padding:22px 28px 16px;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 70% 50%,rgba(var(--acc-rgb),.05),transparent);pointer-events:none}
.badge{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--acc);background:rgba(var(--acc-rgb),.1);border:1px solid rgba(var(--acc-rgb),.25);padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:8px;letter-spacing:1px}
.hdr h1{font-size:clamp(15px,2.5vw,20px);font-weight:800;margin-bottom:3px}
.hdr p{font-size:12px;color:var(--tx2)}
.sel-bar{padding:14px 28px;background:var(--surf);border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.sel-bar label{font-size:13px;font-weight:700;color:var(--tx2)}
select{font-family:'Manrope',sans-serif;font-size:13px;font-weight:600;padding:8px 14px;background:var(--surf2);color:var(--tx);border:1px solid var(--brd);border-radius:8px;cursor:pointer;min-width:280px;outline:none}
select:focus{border-color:var(--acc)}
.content{padding:22px 28px;max-width:1200px}
.tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.tb{padding:7px 16px;border:1px solid var(--brd);background:transparent;color:var(--tx2);cursor:pointer;border-radius:6px;font-family:'Manrope',sans-serif;font-size:12px;font-weight:600;transition:all .15s}
.tb:hover{border-color:var(--acc);color:var(--acc)}
.tb.active{background:var(--acc);color:#ffffff;border-color:var(--acc)}
.tab-pane{display:none}.tab-pane.active{display:block}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:18px 20px;margin-bottom:16px}

.di{background:var(--surf2);border:1px solid var(--brd);border-radius:7px;padding:10px 12px}
.dl{font-size:11px;color:var(--tx2);margin-bottom:3px;font-family:'JetBrains Mono',monospace;font-weight:600}
.dv{font-size:15px;font-weight:700;color:var(--acc);font-family:'JetBrains Mono',monospace}
.du{font-size:11px;color:var(--tx2);margin-left:3px;font-weight:600}

.stitle{font-size:12px;font-weight:700;color:var(--org);margin:14px 0 7px;display:flex;align-items:center;gap:7px}

.rtable{width:100%;border-collapse:collapse;font-size:12px}
.rtable th{background:var(--surf2);color:var(--tx2);padding:9px 10px;text-align:center;border:1px solid var(--brd);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.rtable td{padding:8px 10px;text-align:center;border:1px solid var(--brd);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx)}
.rtable tr:hover td{background:rgba(var(--acc-rgb),.04)}

.clabel{font-size:11px;color:var(--tx3);margin-bottom:8px;font-weight:600}
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.vgrid{grid-template-columns:1fr}}
.vwrap{background:var(--surf2);border:1px solid var(--brd);border-radius:9px;padding:12px;display:flex;flex-direction:column;align-items:center}
.vwrap p{font-size:12px;color:var(--tx2);margin-bottom:8px;font-weight:600;align-self:flex-start}
.swrap{background:var(--surf2);border:1px solid var(--brd);border-radius:9px;padding:16px;overflow-x:auto}
.ablk{border:1px solid var(--brd);border-radius:8px;padding:14px;margin-bottom:12px}
.ablk.info{border-color:rgba(var(--acc-rgb),.3);background:rgba(var(--acc-rgb),.02)}
.ablk.good{border-color:rgba(var(--grn-rgb),.3);background:rgba(var(--grn-rgb),.02)}
.ablk.warn{border-color:rgba(var(--org-rgb),.4);background:rgba(var(--org-rgb),.02)}
.ablk h4{font-size:12px;font-weight:700;margin-bottom:7px}
.ablk.info h4{color:var(--acc)}.ablk.good h4{color:var(--grn)}.ablk.warn h4{color:var(--org)}
.ablk p,.ablk li{font-size:14px;color:var(--tx1);line-height:1.75}
.ablk ul{margin:6px 0 0 16px}
/* Таблиця ітерацій */
.iter-table{width:100%;border-collapse:collapse;font-size:11px;margin:8px 0}
.iter-table th{background:var(--surf2);color:var(--tx2);padding:6px 8px;text-align:center;border:1px solid var(--brd);font-weight:700;font-size:10px}
.iter-table td{padding:6px 8px;text-align:center;border:1px solid var(--brd);font-family:'JetBrains Mono',monospace;font-size:11px}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#c0c7cf;border-radius:3px}
