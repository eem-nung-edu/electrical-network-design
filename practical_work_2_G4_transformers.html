@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');

/* ── СВІТЛА ЕРГОНОМІЧНА ТЕМА ── */
:root {
  --bg:      #f5f6f8;
  --bg2:     #eef0f3;
  --surf:    #ffffff;
  --surf2:   #f0f2f5;
  --surf3:   #e4e7ec;
  --brd:     #d1d5db;
  --brd2:    #b8bec8;

  --acc:     #1d6fbf;
  --grn:     #166534;
  --red:     #b91c1c;
  --pur:     #6d28d9;
  --org:     #c2410c;
  --cyn:     #0e7490;
  --ylw:     #92400e;

  --tx:      #111827;
  --tx2:     #374151;
  --tx3:     #6b7280;

  --acc-rgb: 29,111,191;
  --grn-rgb: 22,101,52;
  --red-rgb: 185,28,28;
  --org-rgb: 194,65,12;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--tx);
  min-height: 100vh;
  line-height: 1.65;
  font-size: 17px;
  -webkit-font-smoothing: antialiased;
}

.hdr {
  background: linear-gradient(135deg, #1e3a5f 0%, #1d4ed8 50%, #1e3a5f 100%);
  border-bottom: 1px solid #1e3a5f;
  padding: 20px 28px 16px;
  position: relative;
  overflow: hidden;
}
.hdr::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(255,255,255,.07) 0%, transparent 70%);
  pointer-events: none;
}
.badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  color: #bfdbfe;
  background: rgba(255,255,255,.15);
  border: 1px solid rgba(255,255,255,.3);
  padding: 3px 10px;
  border-radius: 20px;
  display: inline-block;
  margin-bottom: 8px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
}
.hdr h1 {
  font-size: clamp(15px, 2.2vw, 21px);
  font-weight: 700;
  margin-bottom: 3px;
  color: #ffffff;
}
.hdr p { font-size: 12px; color: #bfdbfe; }

.sel-bar {
  padding: 12px 28px;
  background: var(--bg2);
  border-bottom: 1px solid var(--brd);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.sel-bar label { font-size: 14px; font-weight: 600; color: var(--tx2); }
select {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  padding: 8px 14px;
  background: var(--surf);
  color: var(--tx);
  border: 1px solid var(--brd);
  border-radius: 6px;
  cursor: pointer;
  min-width: 300px;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
select:focus { border-color: var(--acc); box-shadow: 0 0 0 3px rgba(29,111,191,.15); }
#selInfo {
  font-size: 13px;
  color: var(--acc);
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
}

.content {
  padding: 20px 28px;
  max-width: 1280px;
}

.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.tb {
  padding: 8px 16px;
  border: 1px solid var(--brd);
  background: var(--surf);
  color: var(--tx2);
  cursor: pointer;
  border-radius: 6px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  transition: all .15s;
  white-space: nowrap;
  box-shadow: 0 1px 2px rgba(0,0,0,.05);
}
.tb:hover { border-color: var(--acc); color: var(--acc); background: #eff6ff; }
.tb.active { background: var(--acc); color: #fff; border-color: var(--acc); box-shadow: 0 1px 3px rgba(29,111,191,.3); }

.tab-pane { display: none; }
.tab-pane.active { display: block; }

.card {
  background: var(--surf);
  border: 1px solid var(--brd);
  border-radius: 10px;
  padding: 18px 20px;
  margin-bottom: 14px;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.ctitle {
  font-size: 12px;
  font-weight: 700;
  color: var(--tx3);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.ctitle::before {
  content: '';
  width: 3px; height: 12px;
  background: var(--acc);
  border-radius: 2px;
  flex-shrink: 0;
}

.dgrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
  gap: 8px;
}
.di {
  background: var(--surf2);
  border: 1px solid var(--brd);
  border-radius: 7px;
  padding: 10px 12px;
}
.dl { font-size: 12px; color: var(--tx3); margin-bottom: 3px; font-family: 'IBM Plex Mono', monospace; font-weight: 600; }
.dv { font-size: 18px; font-weight: 700; color: var(--acc); font-family: 'IBM Plex Mono', monospace; }
.du { font-size: 12px; color: var(--tx3); margin-left: 2px; font-weight: 600; }

.fbox {
  background: #eff6ff;
  border: 1px solid #bfdbfe;
  border-radius: 8px;
  padding: 16px 20px;
  margin: 10px 0;
  font-size: 16px;
  overflow-x: auto;
  line-height: 2.0;
}

.stitle {
  font-size: 14px;
  font-weight: 700;
  color: var(--org);
  margin: 16px 0 7px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.snum {
  width: 22px; height: 22px;
  background: var(--org);
  color: #fff;
  border-radius: 50%;
  font-size: 12px;
  font-weight: 800;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.rline {
  background: #f0fdf4;
  border-left: 3px solid var(--grn);
  padding: 10px 16px;
  border-radius: 0 6px 6px 0;
  margin: 8px 0;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 14px;
  color: var(--grn);
  font-weight: 600;
}
.rline.warn {
  background: #fff7ed;
  border-color: var(--org);
  color: var(--org);
}
.rline.err {
  background: #fef2f2;
  border-color: var(--red);
  color: var(--red);
}

.rtable {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.rtable th {
  background: #f1f5f9;
  color: var(--tx2);
  padding: 10px 12px;
  text-align: center;
  border: 1px solid var(--brd);
  font-weight: 700;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: .5px;
  white-space: nowrap;
}
.rtable td {
  padding: 9px 11px;
  text-align: center;
  border: 1px solid var(--brd);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  color: var(--tx);
  white-space: nowrap;
  background: var(--surf);
}
.rtable tr:hover td { background: #eff6ff; }
.rtable td.hl { color: var(--ylw); font-weight: 700; }
.rtable td.gn { color: var(--grn); font-weight: 700; }
.rtable td.rd { color: var(--red); font-weight: 700; }
.rtable td.ac { color: var(--acc); font-weight: 700; }
.rtable td.pu { color: var(--pur); font-weight: 700; }
.rtable td.selected-row { background: #f0fdf4 !important; border-color: #86efac; }
.rtable tr.selected-row td { background: #f0fdf4; border-left-color: var(--grn); }

.ablk {
  border: 1px solid var(--brd);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 10px;
}
.ablk.info   { border-color: #93c5fd; background: #eff6ff; }
.ablk.good   { border-color: #86efac; background: #f0fdf4; }
.ablk.warn   { border-color: #fed7aa; background: #fff7ed; }
.ablk.danger { border-color: #fca5a5; background: #fef2f2; }
.ablk h4 { font-size: 14px; font-weight: 700; margin-bottom: 7px; }
.ablk.info   h4 { color: var(--acc); }
.ablk.good   h4 { color: var(--grn); }
.ablk.warn   h4 { color: var(--org); }
.ablk.danger h4 { color: var(--red); }
.ablk p, .ablk li { font-size: 15px; color: var(--tx2); line-height: 1.75; }
.ablk ul { margin: 5px 0 0 18px; }
.ablk li { margin-bottom: 4px; }
.ablk b { color: var(--tx); }

.tr-card {
  background: var(--surf2);
  border: 1px solid var(--brd2);
  border-radius: 10px;
  padding: 14px 16px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}
.tr-card.selected-card {
  border-color: var(--grn);
  background: #f0fdf4;
  box-shadow: 0 0 0 1px #86efac;
}
.tr-card.rejected-card {
  border-color: #fca5a5;
  opacity: .7;
}
.tr-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 4px;
  display: inline-block;
  margin-bottom: 5px;
}
.tr-badge.ok     { background: #dcfce7; color: var(--grn); border: 1px solid #86efac; }
.tr-badge.no     { background: #fee2e2; color: var(--red); border: 1px solid #fca5a5; }
.tr-badge.chosen { background: #fef3c7; color: #92400e;   border: 1px solid #fcd34d; }

.vgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media(max-width: 700px) { .vgrid { grid-template-columns: 1fr; } }
.vwrap {
  background: var(--surf2);
  border: 1px solid var(--brd);
  border-radius: 9px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.vwrap p { font-size: 14px; color: var(--tx2); margin-bottom: 8px; font-weight: 600; align-self: flex-start; }

.cgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media(max-width: 800px) { .cgrid { grid-template-columns: 1fr; } }
.cwrap { background: var(--surf2); border: 1px solid var(--brd); border-radius: 9px; padding: 12px; position: relative; height: 270px; }
.clabel { font-size: 13px; color: var(--tx2); margin-bottom: 8px; font-weight: 600; line-height: 1.4; }

.swrap { background: var(--surf2); border: 1px solid var(--brd); border-radius: 9px; padding: 14px; overflow-x: auto; }

.hl  { color: var(--ylw); font-weight: 700; }
.gn  { color: var(--grn); font-weight: 700; }
.rd  { color: var(--red); font-weight: 700; }
.ac  { color: var(--acc); font-weight: 700; }
.pu  { color: var(--pur); font-weight: 700; }
.cy  { color: var(--cyn); font-weight: 700; }
.og  { color: var(--org); font-weight: 700; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--brd2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

@media(max-width: 600px) {
  .content { padding: 10px 12px; }
  .hdr, .sel-bar { padding: 14px 16px; }
  select { min-width: 220px; }
  .card { padding: 14px 12px; }
  .tr-card { grid-template-columns: 1fr; }
  .tabs { gap: 3px; }
  .tb { padding: 7px 11px; font-size: 13px; }
}

.schema-legend {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 10px;
  font-size: 13px;
  color: var(--tx2);
}
.schema-legend span { display: flex; align-items: center; gap: 5px; }
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
