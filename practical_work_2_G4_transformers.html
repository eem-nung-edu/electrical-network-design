  <p>За ПУЕЕ (наказ Міненерговугілля України №476 від 21.07.2017) · ДСТУ EN 60076-1:2016 · ДСТУ IEC 60076-7 · ГОСТ 11677-85 (довідково)</p>

<script>
(function(){
'use strict';

/* ============================================================
   КОЛЬОРОВА ПАЛІТРА
============================================================ */
const T = Object.freeze({
  bg:'#f5f6f8',surf:'#ffffff',surf2:'#f0f2f5',brd:'#d1d5db',
  acc:'#1d6fbf',grn:'#166534',red:'#b91c1c',pur:'#6d28d9',
  org:'#c2410c',cyn:'#0e7490',ylw:'#92400e',
  tx:'#111827',tx2:'#374151',tx3:'#6b7280'
});

/* ============================================================
   СТАНДАРТНІ РІВНІ НАПРУГИ (МЕК 60038, ДСТУ EN 60038:2017)
============================================================ */
const STD_VOLTAGE = Object.freeze([0.22, 0.38, 0.4, 6, 10, 35, 110, 150, 220, 330, 500, 750]);

function voltageMatch(trV, sysV) {
  const tol = sysV <= 1 ? 0.05 : 0.5;
  return Math.abs(trV - sysV) <= tol;
}

/* ============================================================
   ЗМІНА 4а: Заміна формули Вейкерта на формули Железка.
   Джерело: Железко Ю.С. «Споживання реактивної потужності
   і заходи щодо її компенсації», 2009; РД 34.09.255-90.
   Різниця: формула Вейкерта τ = (0.124 + Tmax/10000)²·8760
   не враховує рівень напруги і дає систематичну похибку
   для мереж 110 кВ і вище до 15-20%.
   Формули Железка диференційовані за рівнем напруги і дають
   кращу відповідність реальним графікам навантаження.
   @param {number} Tmax - час використання максимуму, год/рік
   @param {number} Uvn  - напруга сторони ВН, кВ
   @returns {number} τ, год/рік
============================================================ */
function calcTau(Tmax, Uvn) {
  if (Uvn >= 110) {
    // Для мереж 110 кВ і вище — більша частка базового навантаження
    return 0.50 * Tmax + 0.50 * (Tmax * Tmax) / 8760;
  }
  // Для мереж 6–35 кВ
  return 0.25 * Tmax + 0.75 * (Tmax * Tmax) / 8760;
}

/* ============================================================
   ЗМІНА 5а: Визначення очікуваної тривалості аварійного
   перевантаження tper за типом об'єкта (hint) та категорією.
   Фізичний зміст: час від початку аварії до відновлення
   нормального живлення (введення ремонтного резерву або
   доставки резервного трансформатора).
   Джерело класифікації: ДСТУ-Н Б В.2.5-80:2015, розділ 11.
============================================================ */
function deriveTper(hint, catC) {
  // Об'єкти з автоматичним розвантаженням і швидким АВР
  if (/аеропорт/i.test(hint))                          return 0.5;
  if (/лікарня/i.test(hint))                           return 1.0;
  if (/хімічний|хімкомбінат/i.test(hint))              return 2.0;
  // Великі районні підстанції 110 кВ — власна виїзна бригада, мобільний резерв
  // реальний час відновлення 8–12 год (не 48: 48 год — лише для сільських ліній без власної служби)
  if (/районна.*110|110.*район|міська.*пс/i.test(hint)) return 12;
  // Сільські, агро, зрошувальні — доставка резервного тр-ра
  if (/сільськ|агро|зрошув|польов/i.test(hint))        return 24;
  // Водозабір, насосні — залежно від наявності служби
  if (/водозабір|насосна/i.test(hint))                  return 12;
  // Залізниця — швидка виїзна бригада
  if (/залізнич/i.test(hint))                           return 2.0;
  // Цехові ТП, металургія — власна ремонтна служба
  if (/цех|ливарн|машинобуд|металург|ливар/i.test(hint)) return 4.0;
  // Стандарт за категорією
  if (catC === 1) return 2.0;
  if (catC === 2) return 4.0;
  return 6.0;
}

/* ============================================================
   ДСТУ 3463-96 (IEC 354-91): ТРИ РЕЖИМИ ПЕРЕВАНТАЖЕННЯ
   ─ Режим 1 — систематичні (нормальне зношення ізоляції):
       kпер ≤ 1,50 для розподільних (до 2500 кВА, п.1.5 ДСТУ 3463-96)
       kпер ≤ 1,30 для великих силових (понад 100 МВА, п.1.7 ДСТУ 3463-96)
       Середні силові (2,5–100 МВА) — значення за таблицями розд. 3,
       окремого обмеження 1,30 не встановлено; застосовується межа 1,50.
   ─ Режим 2 — тривалі аварійні (прискорене зношення, tper ≥ 2 год):
       kпер ≤ 1,80 для розподільних, ≤ 1,50 для великих
   ─ Режим 3 — короткочасні аварійні (tper < 2 год):
       kпер до 2,0 — описує фізичну здатність трансформатора.
       У цій роботі відображається ДОВІДКОВО (поле mode=3 в UI),
       але для розрахунку Sном_min затиск застосовується завжди.
       ПРИЧИНА: проектувальник закладає запас на випадок коли АВР
       не спрацював або ремонт затягнувся — фактичне tper може
       перевищити «короткочасний» режим (IEC 354-91 п.4.3).
   ДЛЯ ПРОЕКТУВАННЯ — затиск завжди:
       Sном ≤ 100 МВА → kпер ≤ 1,50  (розподільні та середні силові)
       Sном > 100 МВА → kпер ≤ 1,30  (великі силові, п.1.7 ДСТУ 3463-96)
   Всі трансформатори у базі даних цієї роботи (до 63 МВА) потрапляють
   до категорії «середні силові» → проектна межа kпер = 1,50.
   Джерело: ДСТУ 3463-96, пп.1.5, 1.7, таблиця 1, розділ 3.5; IEC 354-91 розд. 4.
============================================================ */
const KPER_PROJECT_MAX_DIST  = 1.50;  // Sном ≤ 100 МВА (розподільні + середні силові)
const KPER_PROJECT_MAX_POWER = 1.30;  // Sном > 100 МВА (великі силові, п.1.7 ДСТУ 3463-96)

/* Проектна верхня межа kпер залежно від потужності трансформатора.
   Поріг 100 МВА — відповідно до п.1.7 ДСТУ 3463-96 (IEC 354-91).
   @param {number} SnomMVA — номінальна потужність, МВА */
function kperProjectMax(SnomMVA) {
  return SnomMVA > 100 ? KPER_PROJECT_MAX_POWER : KPER_PROJECT_MAX_DIST;
}

/* Сирий результат інтерполяції по таблиці — без проектного затиску.
   Використовується у відображенні (щоб показати фізичне значення і
   порівняти з проектною межею окремим рядком).
   @param {number} beta1 - попереднє завантаження (= β_н норм. режиму)
   @param {number} tper  - тривалість аварійного перевантаження, год
   @returns {number} kпер сирий (2 знаки після коми) */
function calcKperRaw(beta1, tper) {
  // Таблиця побудована за даними ДСТУ 3463-96 (ГОСТ 14209-97, IEC 354-91),
  // розділ 3.5, система охолодження М, θₐ = 20°С.
  // Перехресна перевірка: ДСТУ-Н Б В.2.5-80:2015, табл. 11.1.
  // Рядки: β₁ (попереднє завантаження перед аварією)
  // Стовпці: t пер (тривалість аварійного перевантаження, год)
  const BETA_ROWS = [0.25, 0.50, 0.60, 0.70, 0.80, 0.90];
  const TPER_COLS = [0.5,  1.0,  2.0,  4.0,  6.0, 12.0, 24.0];
  const KPER_TABLE = [
    // t: 0.5   1.0   2.0   4.0   6.0  12.0  24.0
    [2.00, 1.90, 1.75, 1.60, 1.50, 1.35, 1.25],  // β₁ = 0.25
    [1.80, 1.70, 1.60, 1.45, 1.35, 1.25, 1.15],  // β₁ = 0.50
    [1.70, 1.60, 1.50, 1.40, 1.30, 1.20, 1.10],  // β₁ = 0.60
    [1.60, 1.50, 1.45, 1.35, 1.25, 1.15, 1.05],  // β₁ = 0.70
    [1.45, 1.40, 1.35, 1.25, 1.18, 1.10, 1.00],  // β₁ = 0.80
    [1.30, 1.25, 1.20, 1.15, 1.10, 1.05, 1.00],  // β₁ = 0.90
  ];

  const b = Math.min(Math.max(beta1, BETA_ROWS[0]), BETA_ROWS[BETA_ROWS.length - 1]);
  const t = Math.min(Math.max(tper,  TPER_COLS[0]), TPER_COLS[TPER_COLS.length - 1]);

  let bi = BETA_ROWS.findIndex(v => v >= b);
  let ti = TPER_COLS.findIndex(v => v >= t);
  const b0 = bi > 0 ? bi - 1 : 0;
  const b1 = Math.min(bi, BETA_ROWS.length - 1);
  const t0 = ti > 0 ? ti - 1 : 0;
  const t1 = Math.min(ti, TPER_COLS.length - 1);

  if (b0 === b1 && t0 === t1) return KPER_TABLE[b0][t0];

  const db = (b0 === b1) ? 0 : (b - BETA_ROWS[b0]) / (BETA_ROWS[b1] - BETA_ROWS[b0]);
  const dt = (t0 === t1) ? 0 : (t - TPER_COLS[t0]) / (TPER_COLS[t1] - TPER_COLS[t0]);

  const k00 = KPER_TABLE[b0][t0], k01 = KPER_TABLE[b0][t1];
  const k10 = KPER_TABLE[b1][t0], k11 = KPER_TABLE[b1][t1];

  const kper = k00 * (1 - db) * (1 - dt) + k01 * (1 - db) * dt
             + k10 * db       * (1 - dt) + k11 * db       * dt;

  return Math.round(kper * 100) / 100;
}

/* Проектний kпер з затиском до проектної межі (ДСТУ 3463-96).
   Затиск застосовується ЗАВЖДИ незалежно від tper — включаючи Режим 3 (tper < 2 год).
   ОБҐРУНТУВАННЯ: Режим 3 (короткочасний аварійний, IEC 354-91 п.4.3) описує фізичну
   здатність трансформатора, але НЕ є основою для проектного вибору потужності.
   Проектувальник закладає запас на випадок коли АВР не спрацював або ремонт
   затягнувся — тобто tper фактично може вийти за межі «короткочасного» режиму.
   Студентський розрахунок: якщо для аеропорту (tper=0.5 год) не застосовувати
   затиск, kпер може досягати 1.80–2.00, і обирається трансформатор меншої
   потужності — це хибний результат для проектної роботи.
   Режим 3 відображається у UI як довідкова інформація (поле mode=3), але на
   вибір Sном_min НЕ впливає.
   @param {number} beta1   - попереднє завантаження
   @param {number} tper    - тривалість перевантаження, год
   @param {number} SnomMVA - потужність трансформатора, МВА
   @returns {{ kper, kperRaw, kperMax, isClamped, mode }} */
function calcKper(beta1, tper, SnomMVA) {
  const kperRaw = calcKperRaw(beta1, tper);
  const kperMax = kperProjectMax(SnomMVA !== undefined ? SnomMVA : 10);
  const kper    = Math.min(kperRaw, kperMax);
  // mode — довідково для UI (який режим за класифікацією ДСТУ 3463-96)
  const mode    = tper < 2 ? 3 : tper >= 6 ? 1 : 2;
  return { kper, kperRaw, kperMax, isClamped: kperRaw > kperMax, mode };
}

/* Зворотна сумісність: для місць де потрібне тільки число kper.
   SnomMVA за замовчуванням = betaRec-оцінка (10 МВА — консервативна межа). */
function calcKperVal(beta1, tper, SnomMVA) {
  return calcKper(beta1, tper, SnomMVA).kper;
}

/* ============================================================
   ЗМІНА 6 (продовження): автоматичне визначення поля regulation
   за назвою серії трансформатора.
   РПН (регулятор під навантаженням) — ТМН, ТДН, ТДТН, АТДТН.
   ПБЗ (перемикання без збудження) — ТМ, ТМГ, ТМЗ, ТМЗ, ТСЗ.
   Це дозволяє не дублювати поле в кожному записі TR_DB_RAW.
============================================================ */
const TR_DB = Object.freeze(
  Object.fromEntries(
    Object.entries(TR_DB_RAW).map(([name, tr]) => {
      const hasRPN = /^(ТМН|ТДН|ТДТН|АТДТН)/.test(tr.series || '');
      return [name, Object.freeze({ ...tr, regulation: hasRPN ? 'РПН' : 'ПБЗ' })];
    })
  )
);

/* ============================================================
   ВАРІАНТИ ЗАВДАНЬ
============================================================ */
function makeN(catC) {
  if (catC === 1) return { nDefault:2, nAllowed:[2] };
  if (catC === 2) return { nDefault:2, nAllowed:[1,2] };
  return               { nDefault:1, nAllowed:[1,2] };
}

/* ============================================================
   Визначення: чи є об'єкт внутрішньою підстанцією
   (де доцільні сухі трансформатори ТСЗ).
   Критерій: характер об'єкта за текстом hint.
============================================================ */
function isIndoorSubstation(hint) {
  return /університет|торговий центр|лікарня|готель|стадіон|адміністрат/i.test(hint);
}

/* ============================================================
   ЗМІНА 3а: Перевірка допустимості автотрансформатора.
   Логіка переписана: kв повинен бути в діапазоні [0.50, 0.75].
   При kв > 0.75 (наприклад, 110/10 кВ: kв ≈ 0.909) — недопустимо.
   При kв < 0.50 — автотрансформатор економічно недоцільний.
   Також: обидві мережі повинні мати глухозаземлену нейтраль
   (ПУЕЕ § 4.2.19), що в Україні відповідає Uвн ≥ 110 кВ,
   Uнн ≥ 35 кВ (для мережі з глухозаземленою нейтраллю).
============================================================ */
function isAutoAllowed(tr, v) {
  if (!tr.isAuto) return true;
  const kv = 1.0 - tr.Uнн / tr.Uвн;
  const KV_MIN = 0.50;
  const KV_MAX = 0.75;
  if (kv < KV_MIN || kv > KV_MAX) return false;
  // Глухозаземлена нейтраль в Україні: ВН ≥ 110 кВ, НН ≥ 35 кВ
  return v.Uvn >= 110 && v.Unn >= 35;
}

/* ============================================================
   КОНСТАНТИ НОРМУВАННЯ
============================================================ */
const BETA_NORM_MAX  = 0.90;
const BETA_REC_2TR   = 0.70;
const BETA_REC_1TR   = 0.85;
const BETA_MIN_WARN  = 0.50;

/* ============================================================
   ПЕРЕВІРКА ФІЗИЧНОЇ МОЖЛИВОСТІ n=1
============================================================ */
function checkN1Feasibility(v) {
  const Sроз   = Math.sqrt(v.Pmax ** 2 + v.Qmax ** 2);
  const SminNeed = Sроз / (1 * BETA_REC_1TR);
  const maxAvail = Math.max(0, ...Object.values(TR_DB)
    .filter(tr => !tr.is3w && !tr.isAuto && !tr.isDry &&
                  voltageMatch(tr.Uвн, v.Uvn) &&
                  voltageMatch(tr.Uнн, v.Unn))
    .map(tr => tr.Snom / 1000));
  return { possible: maxAvail >= SminNeed, maxAvail, SminNeed };
}

/* ============================================================
   РОЗРАХУНОК SminOne
============================================================ */
function calcSmin(Sроз, n, kper, betaRec) {
  const SminNorm = Sроз / (n * betaRec);
  const SminAv   = n === 2 ? Sроз / kper : 0;
  return { SminNorm, SminAv, SminOne: Math.max(SminAv, SminNorm) };
}

/* ============================================================
   ЗМІНА 7а: Розрахунок відхилення напруги у трансформаторі.
   Формула (точна, з квадратичним членом):
     ΔU% = β·(Uа·cosφ + Uр·sinφ) + β²·(Uа·sinφ − Uр·cosφ)²/200
   де sinφ береться зі знаком:
     sinφ > 0 — відстаючий cosφ (індуктивне навантаження): ΔU > 0 (просадка напруги)
     sinφ < 0 — випереджаючий cosφ (ємнісне навантаження): ΔU < 0 (підвищення напруги)
   ОБЛАСТЬ ЗАСТОСУВАННЯ: дана формула виведена для лінійного (синусоїдального)
   навантаження при усталеному режимі. Знак sinφ відповідає стандартному
   правилу: sinφ > 0 при відстаючому струмі (ДСТУ EN 60076-1:2016, розд. 5).
   У цій роботі всі варіанти мають відстаючий cosφ (tgφ > 0), тому ΔU > 0.
   Джерело: ДСТУ EN 60076-1:2016; Неклепаєв Б.М. «Електрична
   частина електростанцій та підстанцій», 2016.
   Перевірка: |ΔU| ≤ 5% за ДСТУ EN 50160:2014.
   @param {Object} tr      - трансформатор з TR_DB
   @param {number} beta    - коефіцієнт завантаження (β_н)
   @param {number} cosfi   - cos φ навантаження (завжди > 0)
   @param {boolean} lagging - true = відстаючий (індукт.), false = випереджаючий (ємн.)
   @returns {{ Ua_pct, Ur_pct, dU_pct, dU_ok, lagging }}
============================================================ */
function calcVoltageDrop(tr, beta, cosfi, lagging = true) {
  const sinfi_abs = Math.sqrt(Math.max(1 - cosfi * cosfi, 0));
  // sinfi зі знаком: при відстаючому навантаженні > 0, при ємнісному < 0
  const sinfi     = lagging ? sinfi_abs : -sinfi_abs;
  // Uа: активна складова Uкз. dPкз [кВт], Sном [кВА] → результат [%]
  const Ua_pct = (tr.dPкз / tr.Snom) * 100;
  // Uр: реактивна складова (теорема Піфагора у просторі Uкз)
  const Ur_pct = Math.sqrt(Math.max(tr.Uкз * tr.Uкз - Ua_pct * Ua_pct, 0));
  // Відхилення напруги (точна формула з квадратичним членом).
  // При lagging=true: обидва доданки > 0, ΔU > 0 (просадка).
  // При lagging=false: перший доданок може бути < 0, ΔU < 0 (підвищення).
  const dU_pct = beta * (Ua_pct * cosfi + Ur_pct * sinfi)
               + (beta * beta / 200) * Math.pow(Ua_pct * sinfi - Ur_pct * cosfi, 2);
  const dU_ok  = Math.abs(dU_pct) <= 5.0;
  return { Ua_pct, Ur_pct, dU_pct, dU_ok, lagging, sinfi_abs };
}

/* ============================================================
   ОСНОВНА ФУНКЦІЯ ВИБОРУ ТРАНСФОРМАТОРІВ
   АРХІТЕКТУРА вибору (виправлена):
   ─ Фільтр (`.filter()`) — тільки за технічними параметрами:
     напруга, тип (не трьохобмотковий, не авто при заборонених kв,
     не сухий поза внутрішніми ТП). Жодного відсіву за потужністю!
   ─ kperCheck (в `.map()`) — від РЕАЛЬНОГО beta_norm кожного кандидата.
     Фізика: трансформатор із beta_norm=0.57 менш нагрітий у нормальному
     режимі → ізоляція має більший запас → вищий допустимий kper в аварії.
     calcKper(0.57, tper) > calcKper(0.70, tper) — це фізично правильно.
   ─ isValid: check_norm (β_н ≤ 0.90) AND check_av (β_ав ≤ kperCheck).
     Обидві умови — від реальних β, не від betaRec.
   ─ chosen: перший isValid після сортування за Sном зростанням
     → завжди мінімальний типорозмір що задовольняє обидві умови.
   ─ SminNorm/SminAv/SminOne — рахуються від betaRec для відображення
     в розрахунку (показують нормативну нижню межу), але НЕ як фільтр.
   ─ kper у результаті: від chosen.kper (реальне) або від betaRec-оцінки.
============================================================ */
function selectTransformers(Sроз, n, v) {
  const betaRec = n === 2 ? BETA_REC_2TR : BETA_REC_1TR;

  /* kperRef — для відображення нормативної нижньої межі в Кроці 2.
     Від betaRec і умовного Sном=10 МВА (консервативна оцінка середнього типорозміру). */
  const kperRef = n === 2 ? calcKper(betaRec, v.tper, 10).kper : 1.0;
  const { SminNorm, SminAv, SminOne } = calcSmin(Sроз, n, kperRef, betaRec);

  const tau    = calcTau(v.Tmax, v.Uvn);
  const indoor = isIndoorSubstation(v.hint);

  const candidates = Object.entries(TR_DB)
    /* Фільтр ТІЛЬКИ за технічними параметрами — без відсіву за потужністю */
    .filter(([, tr]) => {
      if (!voltageMatch(tr.Uвн, v.Uvn)) return false;
      if (!voltageMatch(tr.Uнн, v.Unn)) return false;
      if (tr.is3w)               return false;
      if (!isAutoAllowed(tr, v)) return false;
      if (tr.isDry && !indoor)   return false;
      return true;
    })
    .map(([name, tr]) => {
      const SnomMVA   = tr.Snom / 1000;
      const beta_norm = Sроз / (n * SnomMVA);
      const beta_av   = Sроз / SnomMVA;
      const dWxx_1    = tr.dPxx * 8760 / 1000;
      const dWkz_1    = tr.dPкз * beta_norm * beta_norm * tau / 1000;
      const SxxMVA    = SnomMVA * tr.Ixx / 100;
      const dPxxMVA   = tr.dPxx / 1000;
      const Qxx       = Math.sqrt(Math.max(SxxMVA * SxxMVA - dPxxMVA * dPxxMVA, 0));
      const kv        = tr.isAuto ? (1 - tr.Uнн / tr.Uвн) : null;
      const S_typ     = tr.isAuto ? SnomMVA * kv : SnomMVA;

      /* kperObj — повний об'єкт від calcKper: містить kper, kperRaw, kperMax, isClamped, mode.
         Для ТСЗ (сухих): kperMax фіксований = 1.20 (ДСТУ EN 60076-11).
         Для масляних: передаємо реальний beta_norm і SnomMVA → отримуємо затиснутий kper. */
      const kperObj = tr.isDry
        ? { kper: tr.kperMax || 1.20, kperRaw: tr.kperMax || 1.20, kperMax: tr.kperMax || 1.20, isClamped: false, mode: 1 }
        : (n === 2 ? calcKper(beta_norm, v.tper, SnomMVA) : { kper:1.0, kperRaw:1.0, kperMax:null, isClamped:false, mode:0 });
      const kperCheck = kperObj.kper;

      const check_norm = beta_norm <= BETA_NORM_MAX;
      const check_av   = n === 1 ? true : beta_av <= kperCheck;
      const isValid    = check_norm && check_av;

      return { name, tr, SnomMVA, beta_norm, beta_av, tau, kper: kperCheck, kperObj,
               dWxx_1, dWkz_1, Qxx, kv, S_typ,
               check_norm, check_av, isValid,
               SminAv, SminNorm, SminOne, betaRec };
    })
    .sort((a, b) => a.SnomMVA - b.SnomMVA);

  /* chosen: перший що проходить обидві умови → мінімальний достатній типорозмір. */
  const chosen = candidates.find(c => c.isValid) || candidates[0] || null;
  const kper   = chosen ? chosen.kper : kperRef;
  return { SminNorm, SminAv, SminOne, betaRec, kper, tau, candidates, chosen };
}

/* ============================================================
   ПОВНИЙ РОЗРАХУНОК ДЛЯ ВАРІАНТА
============================================================ */
function calc(v, n) {
  const Sроз = Math.sqrt(v.Pmax * v.Pmax + v.Qmax * v.Qmax);
  const res  = selectTransformers(Sроз, n, v);
  const { SminNorm, SminAv, SminOne, betaRec, kper, tau, candidates, chosen } = res;

  if (!chosen) {
    return { v, n, Sроз, SminAv, SminNorm, SminOne, kper,
             candidates, chosen: null,
             error: 'Не знайдено відповідного трансформатора в базі даних' };
  }

  const tr      = chosen.tr;
  const SnomMVA = chosen.SnomMVA;
  const beta    = chosen.beta_norm;

  // Струми на стороні ВН
  const Iном_вн  = SnomMVA / (Math.sqrt(3) * v.Uvn) * 1000;
  const Iвн_norm = Sроз    / (Math.sqrt(3) * v.Uvn * n) * 1000;
  const Iвн_av   = Sроз    / (Math.sqrt(3) * v.Uvn)     * 1000;

  // Параметри схеми заміщення (приведені до сторони НН)
  const ukz     = tr.Uкз / 100;
  const Zт      = ukz * tr.Uнн * tr.Uнн / SnomMVA;
  const dPкзMVA = tr.dPкз / 1000;
  const Rт      = dPкзMVA * tr.Uнн * tr.Uнн / (SnomMVA * SnomMVA);
  const Xт      = Math.sqrt(Math.max(Zт * Zт - Rт * Rт, 0));

  // Оптимальне завантаження
  const betaOpt_P = Math.sqrt(tr.dPxx / tr.dPкз);
  const betaOpt_W = Math.sqrt(tr.dPxx * 8760 / (tr.dPкз * tau));

  // Сумарні річні втрати (n трансформаторів)
  const dWxx_total = chosen.dWxx_1 * n;
  const dWkz_total = chosen.dWkz_1 * n;
  const dW_total   = dWxx_total + dWkz_total;

  /* ЗМІНА 7б: розрахунок відхилення напруги — додається до
     результату calc() і використовується у tabCalc() та tabConclusion(). */
  // lagging=true: всі варіанти роботи мають відстаючий cosφ (tgφ > 0 — індуктивне навантаження)
  const vdrop = calcVoltageDrop(tr, beta, v.cosφ, true);

  return {
    v, n, Sроз, SminAv, SminNorm, SminOne, betaRec, kper,
    candidates, chosen,
    beta, Iвн_norm, Iвн_av, Iном_вн,
    Qxx: chosen.Qxx, Zт, Rт, Xт, tau, dPкзMVA,
    dWxx_1: chosen.dWxx_1, dWkz_1: chosen.dWkz_1,
    dWxx_total, dWkz_total, dW_total,
    betaOpt_P, betaOpt_W,
    vdrop,   // { Ua_pct, Ur_pct, dU_pct, dU_ok }
  };
}

/* ============================================================
   ФОРМАТУВАННЯ ЧИСЕЛ
============================================================ */
const fmt  = (x, d=3) => isNaN(x) || !isFinite(x) ? '—' : Number(x).toFixed(d).replace('.', ',');
const N4   = x => fmt(x, 4);
const N3   = x => fmt(x, 3);
const N2   = x => fmt(x, 2);
const N1   = x => fmt(x, 1);
const L4   = x => isNaN(x) || !isFinite(x) ? '{-}' : Number(x).toFixed(4);
const L3   = x => isNaN(x) || !isFinite(x) ? '{-}' : Number(x).toFixed(3);
const L2   = x => isNaN(x) || !isFinite(x) ? '{-}' : Number(x).toFixed(2);
const L1   = x => isNaN(x) || !isFinite(x) ? '{-}' : Number(x).toFixed(1);

/* ============================================================
   СТАН ЗАСТОСУНКУ
============================================================ */
let _charts = {};
let _varIdx = 0;
let _nCur   = 1;

/* ============================================================
   SELECT
============================================================ */
function buildSelect() {
  const sel = document.getElementById('varSel');
  VARS.forEach((v, i) => {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = `Варіант ${v.id} — ${v.hint.slice(0, 55)}${v.hint.length > 55 ? '…' : ''}`;
    sel.appendChild(o);
  });
  sel.addEventListener('change', () => {
    _varIdx = parseInt(sel.value);
    _nCur   = VARS[_varIdx].nDefault;
    onSelect();
  });
}

function onSelect() {
  const v = VARS[_varIdx];
  const d = calc(v, _nCur);
  document.getElementById('selInfo').textContent =
    `P=${v.Pmax} МВт  Q=${v.Qmax} МВАр  UВН=${v.Uvn} кВ  UНН=${v.Unn} кВ  n=${_nCur}  Tmax=${v.Tmax} год  tпер=${v.tper} год  kпер=${d.kper}`;
  renderAll();
}

/* ============================================================
   ГОЛОВНИЙ РЕНДЕР
============================================================ */
function renderAll() {
  Object.values(_charts).forEach(c => { try { c.destroy(); } catch (e) {} });
  _charts = {};

  const v = VARS[_varIdx];
  const d = calc(v, _nCur);

  document.getElementById('app').innerHTML = `
<div class="tabs">
  <button class="tb active" data-tab="t1">📋 Умова</button>
  <button class="tb" data-tab="t2">🔢 Розрахунок</button>
  <button class="tb" data-tab="t3">📦 Каталог / Вибір</button>
  <button class="tb" data-tab="t4">✅ Перевірки ПУЕЕ</button>
  <button class="tb" data-tab="t5">⚡ Втрати енергії</button>
  <button class="tb" data-tab="t6">📈 Графіки</button>
  <button class="tb" data-tab="t7">📝 Висновок</button>
</div>
<div id="t1" class="tab-pane active">${tabCondition(d)}</div>
<div id="t2" class="tab-pane">${tabCalc(d)}</div>
<div id="t3" class="tab-pane">${tabCatalog(d)}</div>
<div id="t4" class="tab-pane">${tabChecks(d)}</div>
<div id="t5" class="tab-pane">${tabLosses(d)}</div>
<div id="t6" class="tab-pane">${tab6html()}</div>
<div id="t7" class="tab-pane">${tabConclusion(d)}</div>`;

  const appEl = document.getElementById('app');
  appEl.querySelectorAll('.tb').forEach(btn => {
    btn.addEventListener('click', () => {
      appEl.querySelectorAll('.tb').forEach(b => b.classList.remove('active'));
      appEl.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      appEl.querySelector('#' + btn.dataset.tab).classList.add('active');
      if (btn.dataset.tab === 't6') setTimeout(() => buildCharts(d), 60);
    });
  });

  appEl.querySelectorAll('.n-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const newN = parseInt(btn.dataset.n);
      if (newN === _nCur) return;
      if (newN === 1) {
        const feas = checkN1Feasibility(VARS[_varIdx]);
        if (!feas.possible) return;
      }
      _nCur = newN;
      onSelect();
    });
  });

  if (window.MathJax && window.MathJax.typesetPromise) {
    MathJax.typesetPromise().catch(e => console.error(e));
  }
}

/* ============================================================
   ТАБ 1 — УМОВА
============================================================ */
function nSwitcherHTML(v, nCur) {
  const { catC, nAllowed, nDefault } = v;
  const catLabels = { 1: 'I', 2: 'II', 3: 'III' };
  const feas = checkN1Feasibility(v);
  const n1PueeAllowed = nAllowed.includes(1);
  const n1Feasible    = feas.possible;
  const n1Available   = n1PueeAllowed && n1Feasible;

  const explanations = {
    1: `<span style="color:var(--red)">⚠️ Категорія I:</span> ПУЕЕ § 4.2.22 — <b>обов'язково n=2</b>. Споживачі I категорії вимагають двох незалежних джерел живлення.`,
    2: `<span style="color:var(--org)">ℹ️ Категорія II:</span> ПУЕЕ § 4.2.22 — <b>рекомендується n=2</b>, допускається n=1 за наявності АВР від сусідньої ТП або резервного кабелю.`,
    3: `<span style="color:var(--grn)">✅ Категорія III:</span> ПУЕЕ § 4.2.23 — <b>достатньо n=1</b>. n=2 допустимо з міркувань надійності або економічності.`,
  };

  const n1Title = !n1PueeAllowed
    ? 'Не допускається ПУЕЕ для категорії ' + catC
    : !n1Feasible
      ? 'Неможливо — навантаження перевищує максимальний типорозмір у базі'
      : (nDefault === 1 ? 'Рекомендовано ПУЕЕ' : 'Допустимо ПУЕЕ');

  const btns = [1, 2].map(n => {
    const isActive   = n === nCur;
    const isRec      = n === nDefault;
    const isDisabled = n === 1 ? !n1Available : !nAllowed.includes(2);
    const titleTxt   = n === 1 ? n1Title : (isRec ? 'Рекомендовано ПУЕЕ' : 'Допустимо ПУЕЕ');
    return `<button class="n-btn${isActive ? ' active' : ''}" data-n="${n}"
      ${isDisabled ? 'disabled' : ''}
      title="${titleTxt}">n = ${n}${isRec ? ' ★' : ''}</button>`;
  }).join('');

  const infeasMsg = n1PueeAllowed && !n1Feasible ? `
<div class="ablk danger" style="margin-top:10px;margin-bottom:0">
  <h4>🚫 Однотрансформаторна схема неможлива</h4>
  <p>Навантаження підстанції <b>S роз = ${N2(Math.sqrt(v.Pmax**2+v.Qmax**2))} МВА</b> перевищує максимальний типорозмір у базі для ${v.Uvn}/${v.Unn} кВ.</p>
  <p>Потрібна S ном ≥ <b>${N2(feas.SminNeed)} МВА</b> (при β рек = ${BETA_REC_1TR}), але найбільший доступний — <b>${N2(feas.maxAvail)} МВА</b>.</p>
</div>` : '';

  return `
<div class="ablk ${catC===1?'danger':catC===2?'warn':'good'}" style="margin-top:12px">
  <h4>🔄 Вибір кількості трансформаторів (ПУЕЕ § 4.2.21–4.2.23)</h4>
  <p style="margin-bottom:10px">${explanations[catC]}</p>
  <div class="n-switcher">${btns}</div>
  <p style="font-size:13px;color:var(--tx3);margin-top:8px">★ — рекомендовано ПУЕЕ для категорії ${catLabels[catC]}</p>
  ${infeasMsg}
</div>`;
}

function tabCondition(d) {

  const S = d.Sроз;
  const sinφ = Math.sqrt(1 - v.cosφ * v.cosφ);
  const tgφ  = sinφ / v.cosφ;

  const schemeLabel = _nCur === 1
    ? 'Однотрансформаторна підстанція'
    : 'Двотрансформаторна підстанція (секційна шина)';

  // ЗМІНА 5а: відображення tper та kper у вихідних даних
  const kperDisplay = d.chosen ? d.kper : calcKper(BETA_REC_2TR, v.tper, 10).kper;

  return `

  <div class="di"><div class="dl">cos φ</div><div class="dv">${N2(v.cosφ)}</div></div>
  <div class="di"><div class="dl">tg φ</div><div class="dv">${N2(tgφ)}</div></div>
  <div class="di"><div class="dl">S роз</div><div class="dv" style="color:var(--ylw)">${N2(S)}<span class="du">МВА</span></div></div>
  <div class="di"><div class="dl">T max</div><div class="dv">${v.Tmax}<span class="du">год/рік</span></div></div>

  <div class="di"><div class="dl">U ВН</div><div class="dv">${v.Uvn}<span class="du">кВ</span></div></div>
  <div class="di"><div class="dl">U НН</div><div class="dv">${v.Unn}<span class="du">кВ</span></div></div>

</div>

  <strong>k пер = ${N2(kperDisplay)}</strong> — допустиме аварійне перевантаження масляного трансформатора

  і тривалості аварії t пер = ${v.tper} год (ДСТУ 3463-96, табл. 3.5.1).
  Залежить від завантаження до аварії та часу відновлення живлення.

${nSwitcherHTML(v, _nCur)}

<div class="card"><div class="ctitle">Схема підстанції</div>

<div class="schema-legend">

  <span><div class="dot" style="background:var(--org)"></div>Трансформатор</span>
  ${_nCur===2?'<span><div class="dot" style="background:var(--pur)"></div>Секційний вимикач (АВР)</span>':''}
</div>
</div>

<div class="card"><div class="ctitle">Нормативна база</div>
<div class="ablk info">
  <h4>📌 Чинні нормативні документи</h4>
  <ul>
    <li><b>ПУЕЕ</b> — Правила улаштування електроустановок України (наказ Міненерговугілля України №476 від 21.07.2017)</li>
    <li><b>ДСТУ EN 60076-1:2016</b> — Силові трансформатори. Частина 1. Загальні відомості (Budstandart)</li>

    <li><b>ДСТУ 3463-96</b> (ГОСТ 14209-97, IEC 354-91) — Допустимі перевантаження масляних трансформаторів. Таблиця 3.5.1: k пер, система М, θₐ = 20°С</li>

      ? `Споживачі I категорії. Двотрансформаторна схема обов'язкова (ПУЕЕ §4.2.22). Секційний вимикач нормально відкритий, при аварії — АВР.`
    : v.catC===2 && _nCur===2
      ? `Споживачі II категорії. Двотрансформаторна схема з АВР. Допускається перерва на час спрацювання АВР (~0,5–1,5 с).`

function nCompareTable(v) {
  const feas = checkN1Feasibility(v);
  const rows = [1, 2].map(n => {
    const r = calc(v, n);
    const isAllowed = v.nAllowed.includes(n);
    if (!r.chosen) {
      return { n, ch: null, r, betaOk: false, betaRec: false, avOk: false,
               isAllowed, isDefault: n === v.nDefault, status: 'rd', infeasible: true };
    }
    const ch = r.chosen;
    const betaOk  = ch.beta_norm <= BETA_NORM_MAX;
    const betaRec = ch.beta_norm <= r.betaRec;
    const avOk    = n === 1 ? true : ch.beta_av <= r.kper;
    const status  = !isAllowed ? 'rd' : betaOk && avOk ? (betaRec ? 'gn' : 'ac') : 'rd';
    return { n, ch, r, betaOk, betaRec, avOk, isAllowed,
             isDefault: n === v.nDefault, status, infeasible: false };
  });

  const makeRow = r => {
    if (r.infeasible) {
      return `<tr>
        <td class="rd" style="font-weight:700">n = ${r.n}${r.isDefault?' ★':''}</td>
        <td colspan="7" style="text-align:left;padding-left:10px;color:var(--red);font-size:13px">
          🚫 Неможливо — S роз перевищує максимальний типорозмір у базі
          (макс. ${N2(feas.maxAvail)} МВА &lt; потрібно ${N2(feas.SminNeed)} МВА)
        </td>
        <td class="rd">✗</td>
      </tr>`;
    }
    return `<tr class="${r.n===_nCur?'selected-row':''}">
      <td class="${r.status}" style="font-weight:700">n = ${r.n}${r.isDefault?' ★':''}</td>
      <td style="text-align:left;padding-left:10px"><b>${r.ch.name}</b></td>
      <td>${r.ch.tr.Snom}</td>
      <td class="${r.betaOk?(r.betaRec?'gn':'ac'):'rd'}">${N2(r.ch.beta_norm)}</td>
      <td class="${r.avOk?'ac':'rd'}">${r.n===2?N2(r.ch.beta_av):'—'}</td>
      <td class="ac">${N2(r.r.kper)}</td>
      <td>${N2(r.r.dW_total)}</td>
      <td class="${r.isAllowed?(r.betaOk&&r.avOk?'gn':'ac'):'rd'}">
        ${!r.isAllowed?'✗ Заборонено':r.betaOk&&r.avOk?'✓ Норма':'⚠ Допустимо'}
      </td>
      <td class="${r.n===_nCur?'pu':''}">
        ${r.n===_nCur?'← поточний':r.isDefault?'★ рекомендовано':'допустимо'}
      </td>
    </tr>`;
  };

  return `
<div class="card"><div class="ctitle">Порівняльна таблиця варіантів схеми</div>
<div style="overflow-x:auto">
<table class="rtable">
<thead><tr>
  <th>Схема</th><th>Обраний тр-р</th><th>S ном, кВА</th>
  <th>β н</th><th>β ав</th><th>k пер</th>
  <th>ΔW Σ, МВт·год/рік</th><th>ПУЕЕ</th><th>Рекомендація</th>
</tr></thead>
<tbody>${rows.map(makeRow).join('')}</tbody>
</table>
</div>
<p style="font-size:13px;color:var(--tx3);margin-top:6px">★ — рекомендовано ПУЕЕ &nbsp;|&nbsp; k пер — ДСТУ 3463-96 (IEC 354-91), розд. 3.5, θₐ = 20°С, система М</p>
</div>`;
}

/* ============================================================
   ТАБ 2 — РОЗРАХУНОК (з Кроком 6 — відхилення напруги)
============================================================ */
function tabCalc(d) {
  const v = d.v;
  const n = d.n;
  const S = d.Sроз;

  </div>
  <div class="fbox-step">
    <div class="step-label"><span class="step-num">2</span>Реактивна складова напруги КЗ:</div>

<tr><td style="text-align:left;font-family:'IBM Plex Mono',monospace;font-size:12px"><b>ДСТУ EN 50160:2014</b></td><td style="text-align:left">Крок 6 — допустиме відхилення напруги ±5% від U ном</td></tr>
<tr><td style="text-align:left;font-family:'IBM Plex Mono',monospace;font-size:12px"><b>ГОСТ 11677-85</b><br><span style="font-size:11px;color:var(--tx3)">(скасований, довідково)</span></td><td style="text-align:left">Каталожні дані серії ТМ (ΔP хх, ΔP кз, U кз, I хх)</td></tr>
</tbody>
</table>
</div>
</div>`;
}

/* ============================================================
   4.2: Пояснення груп з'єднань обмоток трансформатора.
   Критерії вибору групи — принципово важливі для спеціалізації
   «Електротехнічні установки» (вплив на якість напруги, несиметрію,
   гармонійний склад струмів).
   Джерела: ДСТУ EN 60076-1:2016 (позначення груп),
            ДСТУ EN 50160:2014 (гармоніки, несиметрія),
            ПУЕ (аналог ПУЕЕ, розділ про трансформатори).
============================================================ */
function schemeExplanation(scheme) {
  // Витягуємо тип з рядка схеми
  if (/Y\/Yн-0/i.test(scheme)) return {
    group: 'Y/Yн-0',
    name: 'Зірка з нейтраллю / Зірка з нейтраллю, група 0',
    ok: true,
    when: 'Малі потужності (до 250–315 кВА). Рівномірне навантаження фаз (нерівномірність ≤ 25%).',
    warn: 'Не компенсує 3-ю гармоніку струму намагнічування — підвищений рівень гармонійних спотворень у мережі НН. Не рекомендується при значних однофазних або нелінійних навантаженнях.',
    color: 'info',
  };
  if (/Д\/Yн-11/i.test(scheme)) return {
    group: 'Д/Yн-11',
    name: 'Трикутник / Зірка з нейтраллю, група 11',
    ok: true,
    when: 'Потужності від 400 кВА і вище. Системи з однофазними навантаженнями, частотними перетворювачами, випрямлячами.',
    warn: 'Обмотка «Д» замикає контур для 3-ї гармоніки струму намагнічування — значно краща форма кривої напруги на НН. Обов\'язкова при несиметричному або нелінійному навантаженні.',
    color: 'good',
  };
  if (/Y\/Д-11/i.test(scheme)) return {
    group: 'Y/Д-11',
    name: 'Зірка / Трикутник, група 11',
    ok: true,
    when: 'Підстанції 35/10 кВ, 110/10 кВ. З\'єднання з мережею НН без виведеної нейтралі (ізольована нейтраль 10 кВ).',
    warn: 'Нейтраль НН не виведена — живлення однофазних споживачів 0,4 кВ неможливе без знижувального трансформатора 10/0,4 кВ.',
    color: 'info',
  };
  if (/Авт\./i.test(scheme)) return {
    group: 'Авт./Y/Д-0-11',
    name: 'Автотрансформатор, три обмотки',
    ok: true,
    when: 'Тільки при k_в ∈ [0,50; 0,75] і глухозаземленій нейтралі обох мереж.',
    warn: '',
    color: 'warn',
  };
  return null;
}

/* Перевірка схеми: чи потребує попередження для даного об\'єкта */
function schemeWarningFor(scheme, hint) {
  const isAsymLoad = /цех|торговий|завод|лікарня|університет|готель|адміністрат|металург|ливар|хімічн/i.test(hint);
  if (/Y\/Yн-0/i.test(scheme) && isAsymLoad) {
    return `Схема <b>Y/Yн-0</b> обрана трансформатором малої потужності. ` +
      `Для об'єкта «${hint.split(',')[0]}» можлива несиметрія фазних навантажень. ` +
      `Якщо нерівномірність навантаження між фазами перевищить <b>25%</b>, ` +
      `необхідно передбачити перевірку нейтрального проводу або замінити тип ` +
      `трансформатора на <b>Д/Yн-11</b>.`;
  }
  return null;
}

/* ============================================================
   ТАБ 3 — КАТАЛОГ
   ЗМІНА 3б: пояснення чому автотрансформатори не показуються
   для варіантів 110/10 кВ (kв ≈ 0.909 > 0.75).
   ЗМІНА 6б: окремі секції для ТМ, ТМГ, ТМЗ, ТСЗ.
============================================================ */

  // Групуємо трансформатори за серіями

  const filterBySeriesGroup = (seriesArr) =>
    Object.entries(TR_DB).filter(([, tr]) =>
      !tr.is3w && !tr.isAuto &&
      seriesArr.includes(tr.series || '') &&
      voltageMatch(tr.Uвн, v.Uvn) &&
      voltageMatch(tr.Uнн, v.Unn)

  const oilEntries    = filterBySeriesGroup(oilSeries);
  const modernEntries = filterBySeriesGroup(modernSeries);
  const dryEntries    = filterBySeriesGroup(drySeries);

  /* ЗМІНА 3б: логіка відображення автотрансформаторів.
     Автотрансформатори показуються тільки якщо:
     1) Uвн ≥ 110 кВ І Uнн ≥ 35 кВ (глухозаземлена нейтраль обох мереж)
     2) kв = 1 − Uнн/Uвн ∈ [0.50, 0.75]
     Для пари 110/10 кВ: kв ≈ 0.909 > 0.75 → НЕ показуються. */
  const autoEntries = Object.entries(TR_DB).filter(([, tr]) =>
    tr.isAuto &&
    voltageMatch(tr.Uвн, v.Uvn) &&
    voltageMatch(tr.Uнн, v.Unn) &&
    isAutoAllowed(tr, v)

  // Чому для цього варіанта автотрансформатори не показуються
  const autoExcludeReason = (() => {
    if (v.Uvn < 110) return `Напруга ВН = ${v.Uvn} кВ &lt; 110 кВ — мережа без глухозаземленої нейтралі.`;
    if (v.Unn < 35)  {
      const kvHyp = (1 - v.Unn / v.Uvn).toFixed(3);
      return `Для пари ${v.Uvn}/${v.Unn} кВ: k_в = 1 − ${v.Unn}/${v.Uvn} = ${kvHyp}.

        наближається до повної (${Math.round(parseFloat(kvHyp)*100)}% від S_ном),
        що робить його фактично еквівалентним двообмотковому трансформатору,
        але з гіршим захистом через гальванічний зв'язок кіл. ПУЕЕ § 4.2.19
        вимагає k_в ≥ 0,5 і глухозаземлену нейтраль НН — для ${v.Unn} кВ не виконується.`;
    }
    return null;
  })();

  const makeRow = ([name, tr]) => {
    const sm  = tr.Snom / 1000;
    const ok  = sm >= d.SminOne;
    const isCh = chosen && chosen.name === name;
    const regBadge = tr.regulation === 'РПН'
      ? `<span style="font-size:10px;color:var(--grn);font-weight:700;background:#f0fdf4;border:1px solid #86efac;border-radius:3px;padding:1px 4px">РПН</span>`
      : `<span style="font-size:10px;color:var(--tx3);font-weight:600;background:var(--surf2);border:1px solid var(--brd);border-radius:3px;padding:1px 4px">ПБЗ</span>`;
    const dryBadge = tr.isDry
      ? `<span style="font-size:10px;color:var(--pur);font-weight:700;background:#f5f3ff;border:1px solid #c4b5fd;border-radius:3px;padding:1px 4px">СУХИЙ</span>`
      : '';
    return `<tr class="${isCh?'selected-row':''}">
      <td class="${isCh?'gn':ok?'ac':'rd'}" style="text-align:left;padding-left:8px">
        ${isCh?'✅ ':ok?'':'✗ '}<b>${name}</b>
        <div style="margin-top:2px">${regBadge} ${dryBadge}</div>
      </td>
      <td>${tr.Snom}</td><td>${tr.Uвн}</td><td>${tr.Uнн}</td>
      <td>${N2(tr.dPxx)}</td><td>${N2(tr.dPкз)}</td>
      <td>${N1(tr.Uкз)}</td><td>${N2(tr.Ixx)}</td>
      <td style="font-size:11px">${tr.scheme}</td>
      <td class="${ok?'gn':'rd'}">${ok?'✓':'✗'}</td>
    </tr>`;
  };

  const makeAutoRow = ([name, tr]) => {
    const sm  = tr.Snom / 1000;
    const ok  = sm >= d.SminOne;
    const isCh = chosen && chosen.name === name;
    const kv  = (1 - tr.Uнн / tr.Uвн).toFixed(3);
    const Styp = (sm * (1 - tr.Uнн / tr.Uвн)).toFixed(1);
    return `<tr class="${isCh?'selected-row':''}">
      <td class="${isCh?'gn':ok?'pu':'rd'}" style="text-align:left;padding-left:8px">
        ${isCh?'✅ ':''}<b>${name}</b>
        <div style="margin-top:2px"><span style="font-size:10px;color:var(--grn);font-weight:700;background:#f0fdf4;border:1px solid #86efac;border-radius:3px;padding:1px 4px">РПН</span></div>
      </td>
      <td>${tr.Snom}</td><td>${tr.Uвн}</td><td>${tr.Uнн}</td>
      <td>${N2(tr.dPxx)}</td><td>${N2(tr.dPкз)}</td>
      <td>${N1(tr.Uкз)}</td><td>${N2(tr.Ixx)}</td>
      <td style="font-size:11px">${tr.scheme}</td>
      <td class="pu">${kv}</td><td class="pu">${Styp}</td>
      <td class="${ok?'gn':'rd'}">${ok?'✓':'✗'}</td>
    </tr>`;
  };

  const tableHeader = `
<thead><tr>
  <th style="text-align:left">Тип</th><th>S ном, кВА</th><th>U ВН</th><th>U НН</th>
  <th>ΔP хх, кВт</th><th>ΔP кз, кВт</th><th>U кз, %</th><th>I хх, %</th>
  <th>Схема</th><th>S ≥ ${N2(d.SminOne)} МВА</th>
</tr></thead>`;

  // ЗМІНА 2: note-box про статус ГОСТ 11677-85
  const gostNote = `
<div class="note-box">
  <strong>Щодо нормативної бази каталогу:</strong>
  ГОСТ 11677-85 формально скасований в Україні як чинний стандарт, однак продовжує
  використовуватися як довідкове джерело каталожних даних, оскільки серія ДСТУ EN 60076
  (частини 1–19) не повністю охоплює типорозміри та конструктивні параметри трансформаторів
  українського виробництва. Загальні технічні вимоги регулює <strong>ДСТУ EN 60076-1:2016</strong>;
  теплова модель та допустимі перевантаження — <strong>ДСТУ IEC 60076-7</strong>;
  k пер — <strong>ДСТУ 3463-96</strong> (ГОСТ 14209-97, IEC 354-91), розд. 3.5, система М, θₐ = 20°С;
  перехресна перевірка: <strong>ДСТУ-Н Б В.2.5-80:2015, таблиця 11.1</strong>.
  Дані серій ТМГ, ТМЗ — за технічною документацією виробників.
</div>`;

  return `
<div class="card">
<div class="ctitle">Серія ТМ — масляні трансформатори з розширювачем (ГОСТ 11677-85, довідково)</div>
${gostNote}
<div style="overflow-x:auto">
<table class="rtable">${tableHeader}<tbody>${oilEntries.map(makeRow).join('')}</tbody></table>
</div>
</div>

${modernEntries.length > 0 ? `
<div class="card">
<div class="ctitle">Серії ТМГ / ТМЗ — сучасні герметичні масляні трансформатори</div>
<div class="ablk good" style="margin-bottom:10px">
  <h4>✅ Переваги сучасних серій</h4>
  <p><b>ТМГ (герметичні без розширювача):</b> олива не контактує з атмосферою →
  підвищений ресурс ізоляції, знижені втрати ХХ на 15–20%, мінімальне обслуговування.
  Рекомендовані для нових об'єктів замість ТМ (технічна документація виробників).</p>
  <p><b>ТМЗ (з азотною подушкою):</b> захист оливи від окиснення при нестабільному навантаженні,
  підвищена надійність при частих пусках і зупинках (технічна документація виробників).</p>
</div>
<div style="overflow-x:auto">
<table class="rtable">${tableHeader}<tbody>${modernEntries.map(makeRow).join('')}</tbody></table>
</div>
</div>` : ''}

${indoor && dryEntries.length > 0 ? `
<div class="card">
<div class="ctitle">Серія ТСЗ — сухі трансформатори для внутрішніх ТП (ДСТУ EN 60076-11)</div>
<div class="ablk info" style="margin-bottom:10px">
  <h4>ℹ️ Умови застосування ТСЗ для об'єкта «${v.hint.match(/університет|торговий центр|лікарня|готель|стадіон|адміністрат/i)?.[0] || v.hint}»</h4>
  <p>Сухі трансформатори рекомендовані для внутрішніх ТП у громадських будівлях:

  <b>k пер_max = 1,20</b> (ДСТУ EN 60076-11) — менше ніж для масляних (де kпер ≥ 1,35).
  Це необхідно враховувати при визначенні мінімальної потужності.</p>
  <p>Клас нагрівостійкості ізоляції: F (155°C), H (180°C). Шум вищий ніж у масляних.</p>
</div>
${/лікарня/i.test(v.hint) ? `
<div class="ablk warn" style="margin-bottom:10px">
  <h4>⚠️ Особлива примітка для медичних закладів (ДБН В.2.5-23:2010)</h4>
  <p>Для медичних закладів з потужним діагностичним обладнанням
  (<b>рентгенівські апарати, МРТ, томографи, хірургічні роботи</b>) характерне
  <b>імпульсне навантаження</b> з кидками струму 5–10-кратного номінального
  тривалістю 0,05–0,5 с. Для такого режиму:</p>
  <ul>
    <li>k пер_max ТСЗ = <b>1,20</b> може виявитися недостатнім — термічне перевантаження
    обмоток при частих імпульсах без оливяного буфера охолодження</li>
    <li>Рекомендується <b>масляний ТМГ</b> (герметичний, без маслозбірника у приміщенні),
    навіть при внутрішньому встановленні ТП — з маслозбірником відповідно до
    <b>ДБН В.2.5-23:2010</b> і протипожежними заходами</li>
    <li>ТСЗ допускається тільки при підтвердженні відсутності потужного
    імпульсного діагностичного обладнання на даній секції шин</li>

</div>` : ''}
<div style="overflow-x:auto">
<table class="rtable">${tableHeader}<tbody>${dryEntries.map(makeRow).join('')}</tbody></table>

${autoExcludeReason ? `

<div class="ctitle">Автотрансформатори — чому не застосовні для цього варіанта</div>
<div class="ablk warn">
  <h4>⚠️ Автотрансформатори не показуються для ${v.Uvn}/${v.Unn} кВ</h4>

  <p>Автотрансформатори економічно доцільні виключно при <b>k_в = 1 − U_нн/U_вн ∈ [0,50; 0,75]</b>,
  що відповідає парам напруг: 220/110 кВ (k_в = 0,50) та 110/35 кВ (k_в ≈ 0,68).</p>
</div>
</div>` : autoEntries.length > 0 ? `
<div class="card">
<div class="ctitle">Автотрансформатори (ПУЕЕ § 4.2.19, допустимі для ${v.Uvn}/${v.Unn} кВ)</div>
<div class="ablk warn" style="margin-bottom:10px">
  <h4>⚠️ Обмеження застосування автотрансформаторів (ПУЕЕ § 4.2.19)</h4>
  <ul>
    <li>Гальванічний зв'язок ВН та НН: при КЗ на ВН — напруга передається на НН без трансформації</li>

    <li>k_в = 1 − U_нн/U_вн ∈ [0,50; 0,75] — конструктивна економія матеріалів суттєва</li>

<div style="overflow-x:auto">
<table class="rtable">
<thead><tr>
  <th style="text-align:left">Тип</th><th>S ном, кВА</th><th>U ВН</th><th>U НН</th>
  <th>ΔP хх, кВт</th><th>ΔP кз, кВт</th><th>U кз, %</th><th>I хх, %</th>
  <th>Схема</th><th>k_в</th><th>S тип, МВА</th><th>S ≥ ${N2(d.SminOne)} МВА</th>

<div class="card"><div class="ctitle">Обраний трансформатор</div>
${chosen ? `
<div class="ablk good">
  <h4>✅ Прийнятий до встановлення: ${d.n} × <b>${chosen.name}</b>
    ${chosen.tr.isDry ? ' (сухий)' : chosen.tr.isAuto ? ' (автотрансформатор)' : ''}

    <div class="di"><div class="dl">Серія</div><div class="dv" style="font-size:15px">${chosen.tr.series}</div></div>

    <div class="di"><div class="dl">ΔP хх / ΔP кз</div><div class="dv" style="font-size:14px">${chosen.tr.dPxx} / ${chosen.tr.dPкз} кВт</div></div>
    <div class="di"><div class="dl">U кз / I хх</div><div class="dv" style="font-size:14px">${chosen.tr.Uкз}% / ${chosen.tr.Ixx}%</div></div>
    <div class="di"><div class="dl">Схема з'єднань</div><div class="dv" style="font-size:12px">${chosen.tr.scheme}</div></div>
    <div class="di"><div class="dl">β н / β ав</div><div class="dv" style="font-size:14px">${N2(chosen.beta_norm)} / ${d.n===2?N2(chosen.beta_av):'—'}</div></div>
    <div class="di"><div class="dl">Регулювання</div><div class="dv" style="font-size:14px;color:${chosen.tr.regulation==='РПН'?'var(--grn)':'var(--tx3)'}">${chosen.tr.regulation}</div></div>
    ${chosen.tr.isDry?`<div class="di"><div class="dl">k пер max</div><div class="dv" style="font-size:14px;color:var(--pur)">${chosen.tr.kperMax}</div></div>`:''}
  </div>
</div>` : `<div class="ablk danger"><h4>❌ Не знайдено підходящого трансформатора</h4></div>`}
</div>

${(() => {
  if (!chosen) return '';
  const sch = schemeExplanation(chosen.tr.scheme);
  const schWarn = schemeWarningFor(chosen.tr.scheme, v.hint);
  if (!sch) return '';
  return `
<div class="card"><div class="ctitle">Група з'єднань обмоток обраного трансформатора</div>
<div class="ablk ${sch.color}" style="margin-bottom:8px">

  <p><b>Коли застосовується:</b> ${sch.when}</p>
  ${sch.warn ? `<p style="margin-top:6px"><b>Важливо:</b> ${sch.warn}</p>` : ''}
</div>
${schWarn ? `<div class="ablk warn"><h4>⚠️ Перевірка для поточного об'єкта</h4><p>${schWarn}</p></div>` : ''}
<div class="note-box">
  <strong>Довідка — вибір групи з'єднань (ДСТУ EN 60076-1:2016):</strong>
  <ul style="margin:5px 0 0 16px;font-size:14px;line-height:1.9">
    <li><b>Y/Yн-0:</b> ТМ-100…250/10 кВ. Лише при рівномірному навантаженні фаз (нерівномірність ≤ 25%).
    Третя гармоніка струму намагнічування не компенсується → спотворення форми напруги.</li>
    <li><b>Д/Yн-11:</b> ТМ-400 кВА і вище, ТМГ, ТМЗ, ТСЗ. Обмотка «Д» на стороні ВН замикає
    контур для 3-ї гармоніки → значно краща форма кривої напруги на НН. Обов'язкова при
    однофазних споживачах або нелінійних навантаженнях (частотні перетворювачі, випрямлячі).</li>
    <li><b>Y/Д-11:</b> ТМ-1000…6300/35, ТДН/110 кВ. Сторона НН — ізольована нейтраль 10 кВ
    або 6 кВ (без виведення нейтралі).</li>
  </ul>
</div>
</div>`;
})()}`
}

${ck(c1ok,
  `Нормальний режим — обов'язкова межа: β н = ${N2(ch.beta_norm)} ${c1ok?'≤ 0,90 ✓':'> 0,90 ✗'}`,

${ckW(c1rec,
  `Нормальний режим — рекомендований діапазон: β н = ${N2(ch.beta_norm)} ${c1rec?`≤ ${d.betaRec} ✓`:`> ${d.betaRec} ⚠`}`,

${n===2 ? ck(c2ok,
  `Аварійний режим: β ав = ${N2(ch.beta_av)} ${c2ok?`≤ k пер = ${N2(d.kper)} ✓`:`> k пер = ${N2(d.kper)} ✗`}`,
  `ПУЕЕ § 4.2.24. k пер = ${N2(d.kper)} за ДСТУ 3463-96 при β₁ = ${d.betaRec}, t пер = ${v.tper} год, θ = 20°С, система М.`) : ''}
${ck(c3ok,
  `Мінімальне завантаження: β н = ${N2(ch.beta_norm)} ${c3ok?'≥ 0,30 ✓':'< 0,30 ⚠'}`,

${ck(c4ok,
  `Відповідність схеми категорії ${v.catC}`,
  v.catC===1?'ПУЕЕ §4.2.22: I кат. — n=2 обов\'язково.':v.catC===2?`ПУЕЕ §4.2.22: II кат. — n=${n} допустимо.`:'ПУЕЕ §4.2.23: III кат. — достатньо n=1.')}
${ck(c5ok,
  `Напруга КЗ: U кз = ${tr.Uкз}%`,
  `Норма: 4–12,5% (ДСТУ EN 60076-1:2016). Отримано: ${tr.Uкз}%.`)}
${ckW(c6ok,
  `Відхилення напруги: ΔU = ${N2(d.vdrop.dU_pct)}% ${c6ok?'≤ ±5% ✓':'> ±5% ✗'}`,
  `ДСТУ EN 50160:2014: допустиме відхилення ±5% від номінальної напруги. ΔU = ${N2(d.vdrop.dU_pct)}%.
   Регулювання трансформатора: ${tr.regulation}.
   ${Math.abs(d.vdrop.dU_pct) > 2.5 && tr.regulation === 'ПБЗ'
     ? 'При ΔU > 2,5% та ПБЗ — рекомендується трансформатор з РПН (ТМН або ТДН).'
     : ''}`)}
${tr.isDry ? `
<div class="ablk info" style="margin-bottom:8px">
  <h4>ℹ️ Сухий трансформатор ${ch.name} — особливості ДСТУ EN 60076-11</h4>

  <p>• Клас нагрівостійкості: F/H. Відсутня олива → пожежобезпечний для внутрішніх ТП.</p>
  <p>• Підвищений рівень шуму порівняно з масляними трансформаторами.</p>

<div class="card"><div class="ctitle">Зведена таблиця перевірок</div>

<tr><td style="text-align:left">Схема / категорія</td><td>ПУЕЕ §4.2.21</td><td class="hl">n=${n}</td><td>кат. ${v.catC}</td><td class="${c4ok?'gn':'rd'}">${c4ok?'✓ Норма':'✗ Не відповідає'}</td></tr>

/* ============================================================
   ТАБ 5 — ВТРАТИ ЕНЕРГІЇ
   ЗМІНА 4г: LaTeX-формула τ — оновлена (Железко, а не Вейкерт)
============================================================ */
function tabLosses(d) {
  if (!d.chosen) return `<div class="card"><div class="ablk danger"><h4>Немає даних</h4></div></div>`;
  const v = d.v, n = d.n, ch = d.chosen, tr = ch.tr;
  const tau  = d.tau;
  const beta = ch.beta_norm;
  const Tmax = v.Tmax;

  // ЗМІНА 4г: формула τ відповідає calcTau() — Железко
  const tauFormulaLabel = v.Uvn >= 110
    ? 'Железка (для мереж 110 кВ і вище)'
    : 'Железка (для мереж 6–35 кВ)';
  const tauLatex = v.Uvn >= 110
    ? `\\[ \\tau = 0{,}50 \\cdot T_{max} + 0{,}50 \\cdot \\frac{T_{max}^2}{8760}
         = 0{,}50 \\cdot ${Tmax} + 0{,}50 \\cdot \\frac{${Tmax}^2}{8760}
         = ${L1(tau)}\\ \\text{год/рік} \\]`
    : `\\[ \\tau = 0{,}25 \\cdot T_{max} + 0{,}75 \\cdot \\frac{T_{max}^2}{8760}
         = 0{,}25 \\cdot ${Tmax} + 0{,}75 \\cdot \\frac{${Tmax}^2}{8760}
         = ${L1(tau)}\\ \\text{год/рік} \\]`;

  // Попередження для об'єктів зі змінним графіком
  const isVariableLoad = /стадіон|аеропорт|торговий центр|ринок/i.test(v.hint);
  const variableWarning = isVariableLoad ? `
<div class="note-box" style="border-left-color:var(--org)">
  <strong>⚠️ Застереження для об'єкта «${v.hint.split(',')[0]}»:</strong>
  Для об'єктів з різко змінним графіком навантаження формула Железка дає наближений
  результат з можливою похибкою 15–30%. Для точного розрахунку необхідний добовий
  графік навантаження (8–24 точки) та інтегрування:
  \\(\\tau = \\int_0^{8760} [i(t)/i_{max}]^2\\,dt\\).
  Сучасна практика передбачає використання даних АСКОЕ.
</div>` : '';

  const fixedB  = [0.25, 0.50, 0.70, 0.85, 1.00];
  const betaR   = Math.round(beta * 100) / 100;
  const bIn     = fixedB.some(b => Math.abs(b - betaR) < 0.02);
  const pts     = bIn ? fixedB : [...fixedB, betaR].sort((a, b) => a - b);

  return `
<div class="card"><div class="ctitle">Крок 1 — Час найбільших втрат τ (формула ${tauFormulaLabel})</div>
${variableWarning}
<div class="fbox">
${tauLatex}
</div>
<div class="note-box">
  <strong>Методологія:</strong>
  Формули Железка диференційовані за рівнем напруги і дають кращу відповідність
  реальним графікам навантаження, ніж формула Вейкерта τ = (0,124 + T_max/10000)²·8760,
  яка не враховує рівень напруги. Для точного результату (у комерційних розрахунках)
  використовують добовий графік навантаження та інтегрування або дані АСКОЕ.
</div>
<div class="rline">τ = ${N1(tau)} год/рік &nbsp;|&nbsp; T max = ${Tmax} год/рік &nbsp;|&nbsp; U ВН = ${v.Uvn} кВ</div>
</div>

<div class="card"><div class="ctitle">Крок 2 — Річні втрати електроенергії</div>
<div class="note-box">
  <strong>Розмірність:</strong> Всі формули показують втрати <b>на один трансформатор</b>.
  Підсумкові значення в рядку «Σ» — сумарно для <b>всіх n=${n} трансформаторів</b>.
  ΔP [кВт] ÷ 1000 = [МВт]; [МВт] × [год] = [МВт·год].
</div>
<div class="fbox">
  <div class="fbox-step">
    <div class="step-label"><span class="step-num">1</span>Незмінні втрати — на 1 тр-р (ΔP хх = ${tr.dPxx} кВт = ${L4(tr.dPxx/1000)} МВт):</div>
    \\[ \\Delta W_{XX}^{(1)} = \\Delta P_{XX}\\,[\\text{МВт}] \\cdot 8760\\,[\\text{год}]
       = ${L4(tr.dPxx/1000)} \\cdot 8760 = ${L2(d.dWxx_1)}\\ \\text{МВт·год/рік} \\]
  </div>
  <div class="fbox-step">
    <div class="step-label"><span class="step-num">2</span>Змінні втрати — на 1 тр-р (ΔP кз = ${tr.dPкз} кВт = ${L4(tr.dPкз/1000)} МВт):</div>
    \\[ \\Delta W_{КЗ}^{(1)} = \\Delta P_{КЗ}\\,[\\text{МВт}] \\cdot \\beta_н^2 \\cdot \\tau
       = ${L4(tr.dPкз/1000)} \\cdot ${L2(beta)}^2 \\cdot ${L1(tau)} = ${L2(d.dWkz_1)}\\ \\text{МВт·год/рік} \\]
  </div>
  <div class="fbox-step">
    <div class="step-label"><span class="step-num">3</span>Сумарні річні втрати — усі n=${n} тр-рів:</div>
    \\[ \\Delta W_{\\Sigma} = n \\cdot \\left(\\Delta W_{XX}^{(1)} + \\Delta W_{КЗ}^{(1)}\\right)
       = ${n} \\cdot \\left(${L2(d.dWxx_1)} + ${L2(d.dWkz_1)}\\right) = ${L2(d.dW_total)}\\ \\text{МВт·год/рік} \\]
  </div>
  <div class="fbox-step">
    <div class="step-label"><span class="step-num">4</span>Відносні втрати:</div>
    \\[ \\delta W = \\frac{\\Delta W_{\\Sigma} \\cdot 10^3}{P_{max} \\cdot T_{max}} \\cdot 100
       = \\frac{${L2(d.dW_total)} \\cdot 10^3}{${v.Pmax} \\cdot ${Tmax}} \\cdot 100
       = ${L2(d.dW_total / (v.Pmax * Tmax) * 100)}\\ \\% \\]
  </div>
</div>
<div class="kpi-grid">
  <div class="kpi"><div class="kpi-val" style="color:var(--acc)">${N2(d.dWxx_1)}</div><div class="kpi-lbl">ΔW XX — 1 тр-р, МВт·год</div></div>
  <div class="kpi"><div class="kpi-val" style="color:var(--red)">${N2(d.dWkz_1)}</div><div class="kpi-lbl">ΔW КЗ — 1 тр-р, МВт·год</div></div>
  <div class="kpi"><div class="kpi-val" style="color:var(--acc)">${N2(d.dWxx_total)}</div><div class="kpi-lbl">ΔW XX — ${n} тр-рів, МВт·год</div></div>
  <div class="kpi"><div class="kpi-val" style="color:var(--red)">${N2(d.dWkz_total)}</div><div class="kpi-lbl">ΔW КЗ — ${n} тр-рів, МВт·год</div></div>
  <div class="kpi"><div class="kpi-val" style="color:var(--ylw)">${N2(d.dW_total)}</div><div class="kpi-lbl">ΔW Σ — ${n} тр-рів, МВт·год</div></div>
  <div class="kpi"><div class="kpi-val" style="color:var(--tx3)">${N2(d.dW_total/(v.Pmax*Tmax)*100)}</div><div class="kpi-lbl">δW, %</div></div>
</div>
</div>

<div class="card"><div class="ctitle">Таблиця втрат у характерних точках (усі n=${n} тр-рів)</div>
<div style="overflow-x:auto">
<table class="rtable">
<thead><tr>
  <th>β н</th>
  <th>ΔP XX·n, кВт</th><th>ΔP КЗ·n, кВт</th><th>ΔP Σ·n, кВт</th>
  <th>ΔW XX·n, МВт·год/рік</th><th>ΔW КЗ·n, МВт·год/рік</th><th>ΔW Σ·n, МВт·год/рік</th>
</tr></thead>
<tbody>
${pts.map(b => {
  const pxx = tr.dPxx * n;
  const pkz = tr.dPкз * b * b * n;
  const ps  = pxx + pkz;
  const wxx = tr.dPxx * 8760 * n / 1000;
  const wkz = tr.dPкз * b * b * tau * n / 1000;
  const ws  = wxx + wkz;
  const isCur = Math.abs(b - beta) < 0.01;
  return `<tr class="${isCur?'selected-row':''}">
    <td class="${isCur?'gn':'hl'}" style="font-weight:700">${isCur?'→ ':''}${N2(b)}${isCur?' ←':''}</td>
    <td style="color:var(--acc)">${N2(pxx)}</td><td class="rd">${N2(pkz)}</td>
    <td style="font-weight:700;color:var(--org)">${N2(ps)}</td>
    <td style="color:var(--acc)">${N2(wxx)}</td><td class="rd">${N2(wkz)}</td>
    <td style="font-weight:700">${N2(ws)}</td>
  </tr>`;
}).join('')}
</tbody></table>
</div>
</div>

<div class="card"><div class="ctitle">Оптимальне завантаження</div>
<div class="fbox">
  <div class="fbox-step">
    <div class="step-label"><span class="step-num">1</span>β_опт^ΔW — практичний критерій (рівність річних втрат при τ від Железка):</div>
    \\[ \\beta_{опт}^{\\Delta W} = \\sqrt{\\frac{\\Delta P_{XX} \\cdot 8760}{\\Delta P_{КЗ} \\cdot \\tau}}
       = \\sqrt{\\frac{${L2(tr.dPxx)} \\cdot 8760}{${L2(tr.dPкз)} \\cdot ${L1(tau)}}} = ${L2(d.betaOpt_W)} \\]
  </div>
  <div class="fbox-step">
    <div class="step-label"><span class="step-num">2</span>β_опт^ΔP — теоретична довідка (рівномірний графік, τ = 8760 год):</div>
    \\[ \\beta_{опт}^{\\Delta P} = \\sqrt{\\frac{\\Delta P_{XX}}{\\Delta P_{КЗ}}}
       = \\sqrt{\\frac{${L2(tr.dPxx)}}{${L2(tr.dPкз)}}} = ${L2(d.betaOpt_P)} \\]
    <p style="font-size:13px;color:var(--tx3)">Застосовний лише при рівномірному графіку навантаження (τ = 8760 год). Для реальних змінних графіків використовуйте β_опт^ΔW.</p>
  </div>
</div>
<div class="kpi-grid">
  <div class="kpi"><div class="kpi-val" style="color:var(--grn)">${N2(d.betaOpt_W)}</div><div class="kpi-lbl">β опт^ΔW (практичний)</div></div>
  <div class="kpi"><div class="kpi-val" style="color:var(--tx3)">${N2(d.betaOpt_P)}</div><div class="kpi-lbl">β опт^ΔP (довідка)</div></div>
  <div class="kpi" style="background:${Math.abs(beta-d.betaOpt_W)<0.08?'#f0fdf4':'#fff7ed'};border-color:${Math.abs(beta-d.betaOpt_W)<0.08?'#86efac':'#fed7aa'}">
    <div class="kpi-val" style="color:${Math.abs(beta-d.betaOpt_W)<0.08?'var(--grn)':'var(--org)'}">${N2(beta)}</div>
    <div class="kpi-lbl">β н поточний</div>
  </div>
</div>
</div>`;
}

function buildCharts(d) {
  Object.values(_charts).forEach(c => { try { c.destroy(); } catch (e) {} });
  _charts = {};
  if (!d.chosen) return;
  const v = d.v, n = d.n, ch = d.chosen, tr = ch.tr, tau = d.tau;
  const bc = ch.beta_norm;
  const betas = [];
  for (let b = 0.05; b <= 1.45; b = Math.round((b + 0.05) * 100) / 100) betas.push(b);

  const isDark  = window.matchMedia('(prefers-color-scheme:dark)').matches;
  const cText   = isDark ? '#c2c0b6' : '#3d3d3a';
  const cGrid   = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)';

  const axOpts = (xLbl, yLbl, yMin, yMax) => ({
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { display: true, labels: { color: cText, font: { family:'IBM Plex Sans', size:11 }, boxWidth:11, padding:8 } },
      tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${Number(ctx.parsed.y).toFixed(3).replace('.', ',')}` } }
    },
    scales: {
      x: { type:'linear', min:0, max:1.5, ticks:{ color:cText, font:{size:10}, stepSize:0.1 }, grid:{ color:cGrid },
           title:{ display:true, text:xLbl, color:cText, font:{size:10} } },
      y: { min:yMin, max:yMax, ticks:{ color:cText, font:{size:10} }, grid:{ color:cGrid },
           title:{ display:true, text:yLbl, color:cText, font:{size:10} } }
    }
  });

  const vline = (yMin, yMax, lbl, col) => ({
    label: lbl, data: [{x:bc,y:yMin},{x:bc,y:yMax}],
    borderColor: col, backgroundColor: 'transparent',
    borderWidth: 1.5, borderDash: [4, 3], pointRadius: 0, tension: 0, fill: false
  });

  const mkLine = (id, ds, xLbl, yLbl, yMin, yMax) => {
    const el = document.getElementById(id);
    if (!el) return;
    try { _charts[id] = new Chart(el.getContext('2d'), { type:'line', data:{datasets:ds}, options:axOpts(xLbl,yLbl,yMin,yMax) }); }
    catch (e) {}
  };

  // ΔP(β)
  const dpMax = tr.dPкз * 1.4 * 1.4 * n * 1.1;
  mkLine('cDP', [
    { label:`ΔP КЗ·${n}, кВт`, data:betas.map(b=>({x:b,y:tr.dPкз*b*b*n})),
      borderColor:'#b91c1c',backgroundColor:'#b91c1c14',tension:0.35,fill:true,borderWidth:2.5,pointRadius:0 },
    { label:`ΔP XX·${n} = const`, data:betas.map(b=>({x:b,y:tr.dPxx*n})),
      borderColor:'#1d6fbf',backgroundColor:'transparent',borderDash:[5,4],borderWidth:2,pointRadius:0 },
    vline(0, dpMax, `β н=${N2(bc)}`, '#92400e')
  ], 'β', 'кВт', 0, dpMax);

  // η(β)
  const etaFn = (b, dPxx, dPkz, Sn, cosfi) => {
    const Pkw = b * Sn * 1000 * cosfi;
    return Pkw / (Pkw + dPxx + dPkz * b * b) * 100;
  };
  const etaVals = betas.map(b => etaFn(b, tr.dPxx, tr.dPкз, ch.SnomMVA, v.cosφ));
  const etaMin  = Math.max(88, Math.min(...etaVals) - 0.3);
  const etaMax  = Math.min(100, Math.max(...etaVals) + 0.2);
  const etaAtN  = etaFn(bc, tr.dPxx, tr.dPкз, ch.SnomMVA, v.cosφ);
  const bOpt    = Math.sqrt(tr.dPxx / tr.dPкз);
  const etaAtOpt = etaFn(bOpt, tr.dPxx, tr.dPкз, ch.SnomMVA, v.cosφ);
  mkLine('cEta', [
    { label:`η(β), % [${tr.Snom} кВА]`,
      data:betas.map((b,i)=>({x:b,y:etaVals[i]})),
      borderColor:'#166534',backgroundColor:'#16653414',tension:0.4,fill:true,borderWidth:2.5,pointRadius:0 },
    { label:`β н=${N2(bc)}, η=${N2(etaAtN)}%`,
      data:[{x:bc,y:etaMin},{x:bc,y:etaAtN}],
      borderColor:'#6d28d9',backgroundColor:'transparent',borderDash:[5,4],borderWidth:2,pointRadius:0 },
    { label:`β опт=${N2(bOpt)}, η_max=${N2(etaAtOpt)}%`,
      data:[{x:bOpt,y:etaMin},{x:bOpt,y:etaAtOpt}],
      borderColor:'#c2410c',backgroundColor:'transparent',borderDash:[3,3],borderWidth:1.5,pointRadius:0 },
  ], 'β', 'η, %', etaMin, etaMax);

  // ΔW порівняння кандидатів
  const allCands = d.candidates;
  const choIdx  = allCands.findIndex(c => c.name === ch.name);
  const dispCands = [
    choIdx > 0 ? allCands[choIdx-1] : null,
    allCands[choIdx],
    choIdx < allCands.length-1 ? allCands[choIdx+1] : null
  ].filter(Boolean).slice(0, 3);
  const cColors  = ['#6b7280', '#166534', '#1d6fbf'];
  const cWidths  = [1.5, 2.5, 1.5];
  const dwMax = Math.max(...dispCands.map(c => (c.tr.dPxx*8760 + c.tr.dPкз*1.4*1.4*tau)*n/1000)) * 1.1;
  const dwDatasets = dispCands.map((c, i) => ({
    label: `${c.name}${c.name===ch.name?' ← обраний':''}`,
    data: betas.map(b => ({x:b, y:(c.tr.dPxx*8760 + c.tr.dPкз*b*b*tau)*n/1000})),
    borderColor: cColors[i], backgroundColor: 'transparent',
    tension:0.35, fill:false, borderWidth:cWidths[i], pointRadius:0, borderDash:i===1?[]:[4,3]
  }));
  dwDatasets.push(vline(0, dwMax, `β н=${N2(bc)}`, '#92400e'));
  mkLine('cDWcomp', dwDatasets, 'β', 'МВт·год/рік', 0, dwMax);

  // Кругова
  const pieEl = document.getElementById('cPie');
  if (pieEl) {
    const dWxx = tr.dPxx * 8760 * n / 1000;
    const dWkz = tr.dPкз * bc * bc * tau * n / 1000;
    try {
      _charts['cPie'] = new Chart(pieEl.getContext('2d'), {
        type: 'doughnut',
        data: {
          labels: [`ΔW XX (постійні) ${N2(dWxx)} МВт·год`, `ΔW КЗ (змінні) ${N2(dWkz)} МВт·год`],
          datasets: [{ data:[dWxx,dWkz], backgroundColor:['#1d6fbfbb','#b91c1cbb'], borderColor:['#1d6fbf','#b91c1c'], borderWidth:2 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { position:'bottom', labels:{ color:cText, font:{size:11}, padding:12 } },
            tooltip: { callbacks: { label: ctx => `${ctx.label}: ${(ctx.parsed/(dWxx+dWkz)*100).toFixed(1)}%` } }
          }
        }
      });
    } catch (e) {}
  }
}

/* ============================================================
   ТАБ 7 — ВИСНОВОК
   ЗМІНА 1: реквізити нормативів
   ЗМІНА 5д, 7д, 8: kper динамічний; ΔU; РПН/ПБЗ
============================================================ */
function tabConclusion(d) {
  if (!d.chosen) return `<div class="card"><div class="ablk danger"><h4>❌ Немає вибраного трансформатора</h4></div></div>`;
  const v = d.v, n = d.n, ch = d.chosen, tr = ch.tr;
  const relLoss = d.dW_total / (v.Pmax * v.Tmax) * 100;
  const tgφ    = v.Qmax / v.Pmax;
  const allOk  = ch.beta_norm <= BETA_NORM_MAX && ch.beta_av <= d.kper && ch.beta_norm >= 0.3;
  const isOptimal = ch.beta_norm >= 0.65 && ch.beta_norm <= d.betaRec;
  const isUnder   = ch.beta_norm < BETA_MIN_WARN;
  const Qcom      = v.Pmax * (tgφ - 0.33);
  const QcomStep  = v.Unn <= 0.4 ? 0.15 : v.Unn <= 10 ? 0.9 : 1.8;
  const QcomStd   = Math.ceil(Qcom / QcomStep) * QcomStep;

  const nHint = isUnder && v.nAllowed.includes(n === 1 ? 2 : 1) ? `
<div class="ablk warn">
  <h4>⚠️ β н = ${N2(ch.beta_norm)} — трансформатор суттєво недовантажений</h4>
  <p>Рекомендується розглянути варіант з <b>n = ${n===1?2:1}</b>.
  Менший типорозмір при вищому β н дасть кращу економічність (менші питомі втрати ХХ).
  Перемикач кількості трансформаторів — на вкладці <b>📋 Умова</b>.</p>
</div>` : '';

  /* ЗМІНА 8: блок про РПН/ПБЗ у висновку з повним текстом */
  const rpnBlock = (() => {
    const hasRPN = tr.regulation === 'РПН';
    const dU_abs = Math.abs(d.vdrop.dU_pct);
    if (hasRPN) {
      return `
<div class="ablk good">
  <h4>✅ Регулювання напруги: пристрій регулювання під навантаженням (РПН)</h4>
  <p>Трансформатор <b>${ch.name}</b> обладнаний <b>пристроєм регулювання напруги під навантаженням (РПН)</b> —
  зміна коефіцієнта трансформації без відімкнення, діапазон регулювання ±${v.Uvn >= 110 ? '9' : '10'}×1,78% від U ном (${v.Uvn >= 110 ? '9' : '10'} ступенів по 1,78%).
  ΔU = ${N2(d.vdrop.dU_pct)}% — в межах норми.</p>
</div>`;
    }
    if (!hasRPN && dU_abs > 2.5) {
      return `
<div class="ablk warn">
  <h4>⚠️ Регулювання напруги: перемикач без збудження (ПБЗ) — рекомендується РПН</h4>
  <p>Трансформатор <b>${ch.name}</b> обладнаний <b>перемикачем без збудження (ПБЗ)</b> —
  зміна коефіцієнта трансформації можлива тільки при повністю відімкненому трансформаторі.
  Оскільки ΔU = <b>${N2(d.vdrop.dU_pct)}% &gt; 2,5%</b>, рекомендується трансформатор серії
  <b>ТМН або ТДН</b> з <b>регулюванням під навантаженням (РПН)</b>, яке дозволяє змінювати
  напругу без відімкнення.</p>
</div>`;
    }
    return `
<div class="ablk info">
  <h4>ℹ️ Регулювання напруги: перемикач без збудження (ПБЗ) — достатньо</h4>
  <p>Трансформатор <b>${ch.name}</b> обладнаний <b>перемикачем без збудження (ПБЗ)</b> —
  налаштування напруги при плановому відімкненні (±2×2,5%).
  ΔU = <b>${N2(d.vdrop.dU_pct)}%</b> — оперативне регулювання не потрібне.</p>
</div>`;
  })();

  return `
<div class="card">
<div class="ctitle">Висновок — Варіант ${v.id}: ${v.hint}</div>
<div class="ablk ${allOk&&!isUnder?(isOptimal?'good':'info'):isUnder?'warn':'warn'}">
  <h4>${isOptimal?'✅ Оптимальний режим':allOk?'✅ Вибір відповідає вимогам ПУЕЕ':isUnder?'⚠️ Допустимо, але недовантажений':'⚠️ Допустимо з застереженнями'}</h4>
  <p>Підстанція: <b>"${v.hint}"</b> &nbsp;|&nbsp; S роз = <b>${N2(d.Sроз)} МВА</b>
     &nbsp;|&nbsp; T max = <b>${v.Tmax} год/рік</b> &nbsp;|&nbsp; кат. <b>${v.catC}</b>
     &nbsp;|&nbsp; t пер = <b>${v.tper} год</b> &nbsp;|&nbsp; k пер = <b>${N2(d.kper)}</b></p>
  <p style="font-size:20px;font-weight:700;color:var(--ylw);margin-top:4px">${n} × ${ch.name}
    (${tr.Snom} кВА, ${tr.Uвн}/${tr.Uнн} кВ, ${tr.scheme})</p>
</div>
${nHint}
<div class="two-col">
  <div class="ablk info">
    <h4>📊 Основні результати</h4>
    <ul>
      ${n===2?`<li>S ном ≥ S ав = <b>${N2(d.SminAv)} МВА</b> (k пер = ${N2(d.kper)}, t пер = ${v.tper} год)</li>`:''}
      <li>S ном ≥ S norm = <b>${N2(d.SminNorm)} МВА</b> (β рек = ${d.betaRec})</li>
      <li>S ном обрано = <b>${N2(ch.SnomMVA)} МВА</b></li>
      <li>β н = <b>${N2(ch.beta_norm)}</b> ${ch.beta_norm<=d.betaRec?'✅ ≤ '+d.betaRec:ch.beta_norm<=BETA_NORM_MAX?'⚠️ > рекомендованого':'❌ > 0,90'}</li>
      ${n===2?`<li>β ав = <b>${N2(ch.beta_av)}</b> ${ch.beta_av<=d.kper?'✅':'❌'} ≤ k пер = ${N2(d.kper)}</li>`:''}
      <li>ΔU = <b>${N2(d.vdrop.dU_pct)}%</b> ${d.vdrop.dU_ok?'✅ ≤ ±5%':'❌ > ±5%'} (ДСТУ EN 50160:2014)</li>
    </ul>
  </div>
  <div class="ablk info">
    <h4>🔌 Схема заміщення та втрати</h4>
    <ul>
      <li>Z T = <b>${N4(d.Zт)}</b> &nbsp; R T = <b>${N4(d.Rт)}</b> &nbsp; X T = <b>${N4(d.Xт)}</b> Ом</li>
      <li>Q XX = <b>${N4(d.Qxx)} МВАр</b> &nbsp;|&nbsp; τ = <b>${N1(d.tau)} год/рік</b></li>
      <li>ΔW XX (${n} тр-ри) = <b>${N2(d.dWxx_total)} МВт·год/рік</b></li>
      <li>ΔW КЗ (${n} тр-ри) = <b>${N2(d.dWkz_total)} МВт·год/рік</b></li>
      <li>ΔW Σ = <b>${N2(d.dW_total)} МВт·год/рік</b> &nbsp;|&nbsp; δW = <b>${N2(relLoss)}%</b></li>
      <li>β опт^ΔW = <b>${N2(d.betaOpt_W)}</b></li>
    </ul>
  </div>
</div>
${rpnBlock}
${tr.isAuto ? `
<div class="ablk warn">
  <h4>⚠️ Автотрансформатор ${ch.name} — обмеження ПУЕЕ § 4.2.19</h4>
  <ul>
    <li>Гальванічний зв'язок ВН та НН: при КЗ на ВН — напруга передається на НН без трансформації</li>
    <li>Обов'язкове заземлення нейтралі обох рівнів напруги</li>
    <li>k_в = ${N2(ch.kv)} — конструктивна потужність ${N2(ch.S_typ)} МВА</li>
    <li>Потребує спеціального виконання релейного захисту</li>
  </ul>
</div>` : ''}
<div class="ablk ${v.cosφ >= 0.95 ? 'good' : 'warn'}">
  <h4>${v.cosφ >= 0.95 ? '✅' : '⚠️'} Реактивна потужність (ПУЕЕ § 4.3)</h4>
  <p>cos φ = <b>${N2(v.cosφ)}</b>${v.cosφ >= 0.95
    ? '. Компенсація реактивної потужності не потрібна (cos φ ≥ 0,95, ПУЕЕ §4.3).'
    : `<br>Для підвищення cos φ до нормованого 0,95 (tg φ = 0,33) необхідна
       конденсаторна батарея (КБ):<br>
       \\( Q_{ком} = P_{max} \\cdot (\\operatorname{tg}\\varphi - 0{,}33)
       = ${N2(v.Pmax)} \\cdot (${N2(tgφ)} - 0{,}33) = ${N2(Qcom)}\\ \\text{МВАр} \\)<br>
       Приймається компенсувальний пристрій (КП): <b>${N2(QcomStd)} МВАр</b>
       ${v.Unn <= 0.4
         ? '(крок 0,15 МВАр, серія УКРМ-0,4 — автоматична конденсаторна батарея 0,4 кВ)'
         : v.Unn <= 10
           ? '(крок 0,9 МВАр, серія КРМ-10 — конденсаторна батарея 6–10 кВ)'
           : '(крок 1,8 МВАр, серія КРМ-35 — конденсаторна батарея 35 кВ)'}.<br>
       <span style="font-size:13px;color:var(--tx3)">Альтернатива для об\'єктів зі змінним графіком навантаження:
       <b>СТАТКОМ</b> (статичний синхронний компенсатор) — плавне безступінчасте
       регулювання реактивної потужності в діапазоні від −Q до +Q без комутації
       конденсаторів. Перевага: немає перехідних процесів при перемиканні,
       підходить для нелінійних і різко змінних навантажень.</span>`
  }</p>
</div>
<div class="ablk info"><h4>📚 Нормативна база</h4>
  <ul>
    <li><b>ПУЕЕ</b> — наказ Міненерговугілля України №476 від 21.07.2017</li>
    <li><b>ДСТУ EN 60076-1:2016</b> — Силові трансформатори. Загальні вимоги</li>
    <li><b>ДСТУ IEC 60076-7</b> — Теплова модель та допустимі перевантаження масляних тр-рів</li>
    <li><b>ДСТУ 3463-96</b> (ГОСТ 14209-97, IEC 354-91) — Допустимі перевантаження масляних трансформаторів, розд. 3.5, система М</li>
    <li><b>ДСТУ-Н Б В.2.5-80:2015, табл. 11.1</b> — Перехресна перевірка k пер</li>
    <li><b>ДСТУ EN 50160:2014</b> — Якість електроенергії, допустимі відхилення напруги ±5%</b></li>
    <li><b>ГОСТ 11677-85</b> — каталожні дані (скасований, довідково)</li>
  </ul>
</div>
</div>`;
}

/* ============================================================
   СТАРТ
============================================================ */
function init() {
  _nCur = VARS[_varIdx].nDefault;
  if (window.Chart) { buildSelect(); onSelect(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';
  s.onload  = () => { buildSelect(); onSelect(); };
  s.onerror = () => { console.error('Chart.js failed to load'); buildSelect(); onSelect(); };
  document.head.appendChild(s);
}

init();
})();
</script>
</body>
</html>
